# ============================================================
# Grafana 数据源自动配置（compose 部署版）
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # compose 网络下通过服务名通信（默认端口 9090）
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
