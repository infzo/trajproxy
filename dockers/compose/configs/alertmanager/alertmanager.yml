# ============================================================
# AlertManager 配置
# ============================================================

global:
  resolve_timeout: 5m

# 告警路由
route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  # 默认接收器
  receiver: "default"

  # 按严重级别分流
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "default"
      repeat_interval: 4h

# 接收器配置
receivers:
  - name: "default"
    # --- 钉钉 Webhook（取消注释并填入 token）---
    # webhook_configs:
    #   - url: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN"
    #     send_resolved: true
    #     http_config:
    #       follow_redirects: true

    # --- 备选：通用 Webhook ---
    # webhook_configs:
    #   - url: "http://your-webhook-endpoint:8080/alert"
    #     send_resolved: true

  - name: "critical"
    # --- 钉钉 Webhook（取消注释并填入 token）---
    # webhook_configs:
    #   - url: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN"
    #     send_resolved: true

    # --- 邮件（取消注释并配置 SMTP）---
    # email_configs:
    #   - to: "oncall@example.com"
    #     from: "alertmanager@example.com"
    #     smarthost: "smtp.example.com:587"
    #     auth_username: "alertmanager@example.com"
    #     auth_password: "your_password"
    #     send_resolved: true

# 告警抑制规则 — 同一 alertname 只发 critical，不发 warning
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]