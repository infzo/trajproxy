services:
  nginx:
    privileged: true
    image: nginx:alpine
    container_name: litellm_nginx
    ports:
      - "12345:12345"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      litellm:
        condition: service_healthy
    networks:
      - traj-proxy-compose-network
    restart: always

  litellm:
    privileged: true
    image: docker.litellm.ai/berriai/litellm:main-stable
    volumes:
      - ./configs/litellm.yaml:/app/litellm.yaml
    command:
      - "--config=/app/litellm.yaml"
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://llmproxy:dbpassword9090@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
    env_file:
      - ../../.env
    depends_on:
      db:
        condition: service_healthy
      traj_proxy:
        condition: service_started
    networks:
      - traj-proxy-compose-network
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    privileged: true
    image: postgres:16
    restart: always
    container_name: litellm_db
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: dbpassword9090
    command: postgres -c max_connections=300
    ports:
      - "5432:5432"
    # 数据卷（已注释，使用 Docker 管理的匿名卷）
    # volumes:
    #   - ../postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 1s
      timeout: 5s
      retries: 10
    networks:
      - traj-proxy-compose-network

  traj_proxy:
    privileged: true
    build:
      context: ../..
      dockerfile: dockers/compose/Dockerfile
    pull_policy: build
    image: traj_proxy:latest
    container_name: traj-proxy
    ports:
      - "12300-12320:12300-12320"
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml
      - ../../models:/app/models
      - ../../custom_parsers:/app/custom_parsers
      - ../../traj_proxy:/app/traj_proxy
      - ../../archives:/data/archives
      - ../../logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://llmproxy:dbpassword9090@db:5432/traj_proxy
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - LOG_DIR=/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:12300/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - traj-proxy-compose-network

  # ========== Observability Stack ==========

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: compose-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.listen-address=:9090"
      - "--web.enable-lifecycle"
    depends_on:
      traj_proxy:
        condition: service_healthy
    networks:
      - traj-proxy-compose-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.1.0
    container_name: compose-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=trajproxy
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - traj-proxy-compose-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: compose-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./configs/alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"
    networks:
      - traj-proxy-compose-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: litellm_postgres_data
  prometheus_data:
    name: compose_prometheus_data
  grafana_data:
    name: compose_grafana_data
  alertmanager_data:
    name: compose_alertmanager_data

networks:
  traj-proxy-compose-network:
    driver: bridge
    name: traj-proxy-compose-network
