# 归档进程独立部署
# 1个数据库实例对应1个归档容器
#
# 用法:
#   docker-compose -f dockers/archiver/docker-compose.yml up -d
#
# 前提: 需要先构建业务镜像（归档代码打包在同一镜像中）
#   docker-compose -f dockers/compose/docker-compose.yml build traj_proxy

services:
  traj_archiver:
    image: traj_proxy:latest
    container_name: traj-archiver
    restart: always
    volumes:
      - ./configs/archiver.yaml:/app/configs/archiver.yaml
    environment:
      - DATABASE_URL=postgresql://llmproxy:dbpassword9090@db:5432/traj_proxy
      - ARCHIVER_CONFIG=/app/configs/archiver.yaml
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      # 本地模式无需 S3 凭证，归档文件保存在 storage_path
      # S3 模式下取消注释并配置（支持三种方式）：
      #
      # ---- 方式 1: CSB 网关 Token 认证 ----
      # - CSB_APP_TOKEN=your-csb-token
      #
      # ---- 方式 2: 标准 AWS AK/SK ----
      # - AWS_ACCESS_KEY_ID=your-access-key
      # - AWS_SECRET_ACCESS_KEY=your-secret-key
      # - AWS_SESSION_TOKEN=your-session-token   # STS 临时凭证（可选）
      # - AWS_DEFAULT_REGION=us-east-1
    command: python -m traj_archiver
    networks:
      - traj-proxy-compose-network

networks:
  traj-proxy-compose-network:
    external: true
    name: traj-proxy-compose-network
