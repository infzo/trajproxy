# 归档进程测试部署（含 MinIO S3 模拟服务）
# 用于 E2E 测试，验证 S3 归档流程
#
# 用法:
#   docker-compose -f dockers/archiver/docker-compose-test.yml up -d
#   cd tests/e2e && ./run_tests.sh --layer archive
#
# 前提:
#   docker-compose -f dockers/compose/docker-compose.yml build traj_proxy
#   docker-compose -f dockers/compose/docker-compose.yml up -d  # db 服务需要先启动
#
# 网络设计:
#   - traj-proxy-archiver-network: archiver 自有网络，用于 minio 等测试服务互联
#   - traj-proxy-compose-network: compose 主网络（external），用于 traj_archiver 访问 db

services:
  minio:
    image: minio/minio:latest
    container_name: traj-archiver-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - traj-proxy-archiver-network

  # MinIO bucket 初始化（启动时创建 bucket）
  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb local/trajproxy-archives --ignore-existing;
      echo 'MinIO bucket 初始化完成';
      "
    networks:
      - traj-proxy-archiver-network

  traj_archiver:
    image: traj_proxy:latest
    container_name: traj-archiver-test-s3
    restart: always
    volumes:
      - ./configs/archiver-test-s3.yaml:/app/configs/archiver.yaml
    environment:
      - DATABASE_URL=postgresql://llmproxy:dbpassword9090@db:5432/traj_proxy
      - ARCHIVER_CONFIG=/app/configs/archiver.yaml
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      # S3 凭证（MinIO）
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://minio:9000
    command: python -m traj_archiver
    depends_on:
      minio_init:
        condition: service_completed_successfully
    # 双网络: archiver 自有网络（访问 minio）+ compose 网络（访问 db）
    networks:
      - traj-proxy-archiver-network
      - traj-proxy-compose-network

volumes:
  minio_data:

networks:
  traj-proxy-archiver-network:
    driver: bridge
    name: traj-proxy-archiver-network
  traj-proxy-compose-network:
    external: true
    name: traj-proxy-compose-network
