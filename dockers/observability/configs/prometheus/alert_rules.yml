# ============================================================
# TrajProxy 告警规则
# ============================================================

groups:
  - name: trajproxy_alerts
    rules:
      # 1. 错误率过高（> 5%）
      - alert: HighErrorRate
        expr: >
          (
            sum by (node) (rate(trajproxy_requests_total{outcome=~"error_.+|timeout|stream_partial"}[5m]))
            /
            sum by (node) (rate(trajproxy_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.node }} 请求错误率 > 5%"
          description: "当前错误率: {{ $value | humanizePercentage }}"

      # 2. P95 延迟过高（> 60s）
      - alert: HighLatency
        expr: >
          histogram_quantile(0.95,
            sum by (le, node) (rate(trajproxy_request_duration_seconds_bucket[5m]))
          ) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.node }} P95 延迟 > 60 秒"
          description: "当前 P95: {{ $value | humanizeDuration }}"

      # 3. 推理服务错误率过高
      - alert: InferErrors
        expr: >
          sum by (model, node) (rate(trajproxy_infer_errors_total[5m])) > 0.5
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "模型 {{ $labels.model }} 推理错误率过高"
          description: "错误率: {{ $value }}/s"

      # 4. 推理重试频繁
      - alert: InferRetriesHigh
        expr: >
          sum by (model) (rate(trajproxy_infer_retries_total[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "模型 {{ $labels.model }} 重试频率过高"

      # 5. DB 连接池饱和
      - alert: DBPoolSaturation
        expr: >
          trajproxy_db_pool_usage{state="used"}
          / trajproxy_db_pool_usage{state="peak"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接池使用率 > 85%"

      # 6. Worker 不可达
      - alert: WorkerDown
        expr: up{job="trajproxy"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "TrajProxy Worker {{ $labels.instance }} 不可达"

      # 7. Worker 内存过高（> 2GB）
      - alert: WorkerHighMemory
        expr: process_resident_memory_bytes{job="trajproxy"} > 2147483648
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker {{ $labels.instance }} 内存使用 > 2GB"
          description: "当前: {{ $value | humanize1024 }}iB"
