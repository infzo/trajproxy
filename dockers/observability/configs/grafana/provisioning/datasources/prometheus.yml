# ============================================================
# Grafana 数据源自动配置（独立部署版）
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # grafana 与 prometheus 同 compose 网络，通过服务名通信
    url: http://prometheus:19090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
