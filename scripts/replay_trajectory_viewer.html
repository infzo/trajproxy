<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trajectory Viewer Pro</title>
<style>
    /* ==================== CSS Variables & Reset ==================== */
    :root {
        --bg-body: #0f172a;       /* Slate 900 */
        --bg-panel: #1e293b;      /* Slate 800 */
        --bg-card: #1e293b;       /* Slate 800 */
        --bg-card-hover: #334155; /* Slate 700 */
        --bg-input: #0f172a;      /* Slate 900 */

        --border-color: #334155;  /* Slate 700 */
        --border-focus: #6366f1;  /* Indigo 500 */

        --text-main: #f1f5f9;     /* Slate 100 */
        --text-muted: #94a3b8;    /* Slate 400 */
        --text-dim: #64748b;      /* Slate 500 */

        --primary: #6366f1;       /* Indigo 500 */
        --primary-hover: #4f46e5; /* Indigo 600 */
        --danger: #ef4444;        /* Red 500 */
        --success: #10b981;       /* Emerald 500 */
        --warning: #f59e0b;       /* Amber 500 */

        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;

        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-glow: 0 0 15px rgba(99, 102, 241, 0.15);

        --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

    body {
        font-family: var(--font-sans);
        background-color: var(--bg-body);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-size: 14px;
        line-height: 1.5;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-body); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ==================== Components ==================== */
    button {
        cursor: pointer;
        border: none;
        font-family: inherit;
        transition: all 0.2s ease;
    }

    .btn-primary {
        background: var(--primary);
        color: white;
        padding: 6px 14px;
        border-radius: var(--radius-sm);
        font-weight: 500;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 0 10px rgba(99,102,241,0.3); }
    .btn-primary:disabled { background: var(--text-dim); cursor: not-allowed; opacity: 0.6; box-shadow: none; }

    .btn-secondary {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        padding: 4px 10px;
        border-radius: var(--radius-sm);
        font-size: 12px;
    }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text-main); background: var(--bg-card-hover); }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary.active { background: rgba(99,102,241,0.15); border-color: var(--primary); color: #818cf8; }

    input {
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 6px 10px;
        border-radius: var(--radius-sm);
        font-size: 13px;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
    input::placeholder { color: var(--text-dim); }

    .badge {
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .badge-primary { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); }
    .badge-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

    /* ==================== 自定义下拉框 ==================== */
    .custom-dropdown {
        position: relative;
        display: inline-block;
    }
    .dropdown-menu {
        position: absolute;
        top: 100%;
        left: 0;
        min-width: 200px;
        max-height: 300px;
        overflow-y: auto;
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-md);
        z-index: 100;
        display: none;
        margin-top: 2px;
    }
    .dropdown-menu.show { display: block; }
    .dropdown-item {
        padding: 8px 12px;
        cursor: pointer;
        transition: background 0.15s;
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .dropdown-item:hover { background: rgba(99, 102, 241, 0.1); }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item-value { font-family: var(--font-mono); font-size: 12px; color: var(--text-main); }
    .dropdown-item-meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
    .dropdown-empty {
        padding: 12px;
        text-align: center;
        color: var(--text-dim);
        font-size: 12px;
    }
    .dropdown-loading {
        padding: 12px;
        text-align: center;
    }

    /* ==================== Layout ==================== */
    .app-header {
        height: 60px;
        background: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        padding: 0 24px;
        justify-content: space-between;
        z-index: 50;
    }

    .header-left { display: flex; align-items: center; gap: 20px; }
    .brand { font-weight: 700; font-size: 16px; color: var(--text-main); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    .brand span { color: var(--primary); }

    .search-group { display: flex; align-items: center; gap: 12px; padding-left: 20px; border-left: 1px solid var(--border-color); }
    .search-group label { color: var(--text-muted); font-size: 12px; font-weight: 500; }

    .app-body { flex: 1; display: flex; overflow: hidden; }

    /* ==================== Sidebar ==================== */
    .sidebar {
        width: 300px;
        background: var(--bg-panel);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
    }

    .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(30, 41, 59, 0.5);
    }
    .sidebar-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

    .sidebar-search {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border-color);
    }
    .sidebar-search input {
        width: 100%;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 6px 10px;
        border-radius: var(--radius-sm);
        font-size: 12px;
    }
    .sidebar-search input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
    .sidebar-search input::placeholder { color: var(--text-dim); }

    .session-list { flex: 1; overflow-y: auto; }

    .session-item {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.03);
        cursor: pointer;
        transition: background 0.15s;
        border-left: 3px solid transparent;
    }
    .session-item:hover { background: rgba(255,255,255,0.03); }
    .session-item.active {
        background: rgba(99, 102, 241, 0.1);
        border-left-color: var(--primary);
    }
    .session-id { font-family: var(--font-mono); font-size: 12px; color: var(--text-main); margin-bottom: 4px; word-break: break-all; }
    .session-meta { font-size: 11px; color: var(--text-dim); display: flex; justify-content: space-between; }

    /* ==================== Main Content ==================== */
    .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-body); position: relative; }

    .toolbar {
        height: 48px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        padding: 0 20px;
        justify-content: space-between;
        background: var(--bg-body);
    }

    .nav-controls { display: flex; align-items: center; gap: 12px; }
    .nav-info { font-variant-numeric: tabular-nums; color: var(--text-dim); font-size: 12px; font-weight: 500; }

    /* Content Body: 左侧记录卡片 + 右侧轨迹视图 */
    .content-body { flex: 1; display: flex; overflow: hidden; }

    .record-area { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }

    /* Empty States */
    .empty-state {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100%; color: var(--text-dim); text-align: center;
    }
    .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
    .empty-text { font-size: 14px; color: var(--text-muted); }

    /* Record Cards */
    .record-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        margin-bottom: 16px;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
        transition: border-color 0.2s, box-shadow 0.2s;
        position: relative;
    }
    .record-card:hover { border-color: var(--text-dim); }
    .record-card.active { border-color: var(--primary); box-shadow: var(--shadow-glow); }
    .record-card.error { border-left: 3px solid var(--danger); }

    .record-header {
        padding: 12px 16px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255,255,255,0.01);
        border-bottom: 1px solid transparent;
    }
    .record-header:hover { background: rgba(255,255,255,0.03); }
    .record-card.open .record-header { border-bottom-color: var(--border-color); }

    .rh-left { display: flex; align-items: center; gap: 12px; }
    .rh-idx { font-family: var(--font-mono); color: var(--primary); font-weight: 700; font-size: 12px; min-width: 24px; }
    .rh-model { font-weight: 600; font-size: 13px; color: var(--text-main); }
    .rh-time { color: var(--text-dim); font-size: 12px; }

    .rh-right { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 12px; }
    .rh-stats { display: flex; gap: 12px; font-family: var(--font-mono); }
    .rh-arrow { transition: transform 0.2s; color: var(--text-dim); }
    .record-card.open .rh-arrow { transform: rotate(90deg); }

    .btn-traj {
        background: rgba(99, 102, 241, 0.15);
        border: 1px solid rgba(99, 102, 241, 0.3);
        color: #818cf8;
        padding: 2px 8px;
        border-radius: var(--radius-sm);
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
    }
    .btn-traj:hover { background: rgba(99, 102, 241, 0.25); border-color: rgba(99, 102, 241, 0.5); }
    .btn-traj.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* JSON Tree Styles */
    .record-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-in-out;
        background: #161e2e;
    }
    .record-card.open .record-body { max-height: 2000px; overflow: visible; }

    .json-tree { padding: 16px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; }

    .tree-node { margin-left: 20px; position: relative; }
    .tree-row { display: flex; align-items: flex-start; }

    .tree-toggle {
        width: 14px; text-align: left; cursor: pointer; user-select: none;
        color: var(--text-dim); display: inline-block; margin-right: 4px; line-height: 1.4;
        flex-shrink: 0;
    }
    .tree-toggle:hover { color: var(--text-main); }

    .tree-toggle-spacer {
        width: 14px; display: inline-block; margin-right: 4px; flex-shrink: 0;
    }

    .tree-key { color: #93c5fd; }
    .tree-string { color: #86efac; }
    .tree-number { color: #fca5a5; }
    .tree-boolean { color: #fcd34d; }
    .tree-null { color: #94a3b8; font-style: italic; }
    .tree-bracket { color: var(--text-dim); margin: 0 2px; }
    .tree-ellipsis { color: var(--text-dim); font-style: italic; margin-left: 8px; }
    .tree-array-count { color: var(--text-dim); font-size: 11px; margin-left: 4px; }
    .tree-array-scroll {
        max-height: 300px;
        overflow-y: auto;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 4px;
    }
    .tree-string-expandable {
        color: #86efac;
        cursor: pointer;
        border-bottom: 1px dashed rgba(134, 239, 172, 0.4);
    }
    .tree-string-expandable:hover { border-bottom-color: #86efac; }

    /* ==================== Trajectory Panel (右侧) ==================== */
    .traj-panel {
        width: 0;
        min-width: 0;
        overflow: hidden;
        border-left: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        background: var(--bg-panel);
        transition: width 0.3s ease, min-width 0.3s ease;
    }
    .traj-panel.open {
        width: 48%;
        min-width: 420px;
    }

    .traj-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(30, 41, 59, 0.5);
        flex-shrink: 0;
    }
    .traj-header-info { display: flex; align-items: center; gap: 10px; }
    .traj-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
    .traj-record-label { font-family: var(--font-mono); font-size: 12px; color: #818cf8; }
    .traj-model-label { font-size: 12px; color: var(--text-muted); }

    .traj-close {
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
    }
    .traj-close:hover { color: var(--text-main); }

    .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
    }

    /* Chat Messages */
    .chat-msg {
        margin-bottom: 12px;
        padding: 12px 16px;
        border-radius: var(--radius-md);
        position: relative;
    }
    .chat-msg.system {
        background: rgba(100, 116, 139, 0.12);
        border-left: 3px solid #64748b;
    }
    .chat-msg.user {
        background: rgba(59, 130, 246, 0.1);
        border-left: 3px solid #3b82f6;
    }
    .chat-msg.assistant {
        background: rgba(16, 185, 129, 0.1);
        border-left: 3px solid #10b981;
    }
    .chat-msg.tool {
        background: rgba(245, 158, 11, 0.08);
        border-left: 3px solid #f59e0b;
    }
    .chat-msg.thinking {
        background: rgba(139, 92, 246, 0.1);
        border-left: 3px solid #8b5cf6;
    }

    .chat-role {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .chat-role-icon { font-size: 14px; }
    .chat-msg.system .chat-role { color: #94a3b8; }
    .chat-msg.user .chat-role { color: #60a5fa; }
    .chat-msg.assistant .chat-role { color: #34d399; }
    .chat-msg.tool .chat-role { color: #fbbf24; }
    .chat-msg.thinking .chat-role { color: #a78bfa; }

    .chat-content {
        font-size: 13px;
        line-height: 1.7;
        color: var(--text-main);
        white-space: pre-wrap;
        word-break: break-word;
    }

    .chat-content-collapsed {
        max-height: 200px;
        overflow: hidden;
        position: relative;
    }
    .chat-content-collapsed::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 60px;
        background: linear-gradient(transparent, var(--bg-panel));
        pointer-events: none;
    }

    .chat-expand-btn {
        display: block;
        margin-top: 6px;
        background: none;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        padding: 2px 10px;
        border-radius: var(--radius-sm);
        font-size: 11px;
        cursor: pointer;
    }
    .chat-expand-btn:hover { border-color: var(--text-muted); color: var(--text-main); }

    .tool-call-block {
        background: rgba(0,0,0,0.2);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        padding: 8px 12px;
        margin-top: 8px;
        font-family: var(--font-mono);
        font-size: 12px;
    }
    .tool-call-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .tool-call-name { color: #fbbf24; font-weight: 600; }
    .tool-call-id { color: var(--text-dim); font-size: 11px; }
    .tool-call-args { color: var(--text-muted); white-space: pre-wrap; margin-top: 4px; max-height: 200px; overflow-y: auto; }

    /* 思考内容块样式 */
    .thinking-block {
        background: rgba(139, 92, 246, 0.08);
        border: 1px solid rgba(139, 92, 246, 0.2);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        margin-bottom: 10px;
    }
    .thinking-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
        font-size: 11px;
        font-weight: 600;
        color: #a78bfa;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .thinking-content {
        color: var(--text-muted);
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.6;
        max-height: 300px;
        overflow-y: auto;
    }
    .thinking-toggle {
        display: block;
        margin-top: 6px;
        background: none;
        border: 1px solid rgba(139, 92, 246, 0.3);
        color: #a78bfa;
        padding: 2px 10px;
        border-radius: var(--radius-sm);
        font-size: 11px;
        cursor: pointer;
    }
    .thinking-toggle:hover { background: rgba(139, 92, 246, 0.15); }

    /* 正常输出块样式 */
    .output-block {
        background: rgba(16, 185, 129, 0.05);
        border: 1px solid rgba(16, 185, 129, 0.15);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
    }
    .output-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
        font-size: 11px;
        font-weight: 600;
        color: #34d399;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .output-content {
        color: var(--text-main);
        white-space: pre-wrap;
        font-size: 13px;
        line-height: 1.6;
    }

    .chat-separator {
        text-align: center;
        color: var(--text-dim);
        font-size: 11px;
        margin: 16px 0;
        position: relative;
    }
    .chat-separator span {
        background: var(--bg-panel);
        padding: 0 12px;
        position: relative;
        z-index: 1;
    }
    .chat-separator::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--border-color);
    }

    .traj-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-dim);
        text-align: center;
    }
    .traj-empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

    /* Utilities */
    .hidden { display: none !important; }
    .spinner {
        border: 3px solid rgba(255,255,255,0.1); border-left-color: var(--primary);
        border-radius: 50%; width: 24px; height: 24px;
        animation: spin 0.8s linear infinite; margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
    .toast {
        background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-color);
        padding: 10px 16px; border-radius: var(--radius-md); font-size: 13px;
        box-shadow: var(--shadow-md); opacity: 0; transform: translateY(10px);
        transition: all 0.3s; display: flex; align-items: center; gap: 8px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast-success { border-left: 3px solid var(--success); }
    .toast-error { border-left: 3px solid var(--danger); }
    .toast-info { border-left: 3px solid var(--primary); }

    /* ==================== 轨迹分析模态弹窗 ==================== */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s, visibility 0.2s;
    }
    .modal-overlay.show { opacity: 1; visibility: visible; }
    .modal-content {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        width: 90vw;
        max-width: 1000px;
        height: 80vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        transform: translateY(20px);
        transition: transform 0.2s;
    }
    .modal-overlay.show .modal-content { transform: translateY(0); }

    .modal-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text-main); }

<body>

<!-- Header -->
<header class="app-header">
    <div class="header-left">
        <div class="brand">
            <span>&#9670;</span> TrajectoryViewer
        </div>
        <div class="search-group">
            <label>SERVER_ADDRESS</label>

<div class="toast-container" id="toastContainer"></div>

<!-- 轨迹分析模态弹窗 -->
<div class="modal-overlay" id="analysisModal" onclick="closeAnalysisModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">

                                <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
                            </marker>
                        </defs>

<script>
// ==================== State & Config ====================
let currentRecords = [];
let currentRecordIdx = 0;
let windowAllExpanded = true;
let serverUrl = '';
let trajRecordIdx = -1; // 当前轨迹视图显示的 record 索引

const MAX_STRING_LEN = 200;
const MAX_ARRAY_RENDER = 200; // 大数组最多渲染条目数
const CHAT_COLLAPSE_LEN = 800; // 聊天消息超过此长度折叠

// ==================== 预设服务器列表 ====================
const PRESET_SERVERS = [
    { url: 'http://localhost:12300', desc: '本地开发环境' },
    { url: 'http://7.242.105.47:12300', desc: '测试EC2节点' },
    { url: 'http://7.242.104.24:12300', desc: '贵阳地域' },
    { url: 'http://7.216.52.206:12300', desc: '乌兰地域' },
    { url: 'http://7.150.8.143:12300', desc: '华东地域' }
];

/**
 * 初始化服务器下拉列表
 */
function initServerList() {
    renderServerDropdown();
}

/**
 * 渲染服务器下拉框内容
 */
function renderServerDropdown() {
    const dropdown = document.getElementById('serverDropdown');
    dropdown.innerHTML = PRESET_SERVERS.map(s =>
        `<div class="dropdown-item" onclick="selectServer('${escapeHtml(s.url)}')">
            <div class="dropdown-item-value">${escapeHtml(s.url)}</div>
            <div class="dropdown-item-meta">${escapeHtml(s.desc)}</div>
        </div>`
    ).join('');
}

/**
 * 切换服务器下拉框显示/隐藏
 */
function toggleServerDropdown() {
    const dropdown = document.getElementById('serverDropdown');
    const runIdDropdown = document.getElementById('runIdDropdown');

    // 关闭 Run ID 下拉框
    runIdDropdown.classList.remove('show');

    if (dropdown.classList.contains('show')) {
        dropdown.classList.remove('show');
    } else {
        dropdown.classList.add('show');
    }
}

/**
 * 选择服务器选项
 */
function selectServer(value) {
    const input = document.getElementById('serverUrl');
    input.value = value;
    document.getElementById('serverDropdown').classList.remove('show');
    onServerChange();
}

/**
 * 点击外部关闭下拉框
 */
document.addEventListener('click', (e) => {
    // 服务器下拉框
    const serverWrapper = document.getElementById('serverDropdownWrapper');
    const serverDropdown = document.getElementById('serverDropdown');
    if (serverWrapper && serverDropdown && !serverWrapper.contains(e.target)) {
        serverDropdown.classList.remove('show');
    }

    // Run ID 下拉框
    const runIdWrapper = document.getElementById('runIdDropdownWrapper');
    const runIdDropdown = document.getElementById('runIdDropdown');
    if (runIdWrapper && runIdDropdown && !runIdWrapper.contains(e.target)) {
        runIdDropdown.classList.remove('show');
    }
});

/**
 * 服务器地址变化时触发
 * 清空已加载的 Run ID 数据
 */
function onServerChange() {
    // 清空已加载的 Run ID 数据，下次点击时会重新加载
    loadedRunIdData = null;
    document.getElementById('runIdDropdown').innerHTML = '';
}

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', initServerList);

// ==================== Utils ====================
function showToast(msg, type = 'info') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    const icon = type === 'success' ? '&#10004;' : type === 'error' ? '&#10006;' : '&#8505;';
    el.innerHTML = `<span style="font-weight:bold">${icon}</span> <span>${msg}</span>`;
    container.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 300);
    }, 3000);
}

function formatTime(ts) {
    if (!ts) return '-';
    try {
        const d = new Date(ts);
        const pad = (n) => n.toString().padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    } catch { return ts; }
}

function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function truncate(s, len) {
    if (!s || typeof s !== 'string') return s;
    return s.length > len ? s.substring(0, len) + '...' : s;
}

// ==================== API ====================
async function apiGet(path) {
    serverUrl = document.getElementById('serverUrl').value.replace(/\/+$/, '');
    const url = serverUrl + path;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    return resp.json();
}

/**
 * 切换 Run ID 下拉框显示/隐藏
 */
function toggleRunIdDropdown() {
    const dropdown = document.getElementById('runIdDropdown');
    const input = document.getElementById('runId');
    const serverDropdown = document.getElementById('serverDropdown');

    // 关闭服务器下拉框
    serverDropdown.classList.remove('show');

    if (dropdown.classList.contains('show')) {
        dropdown.classList.remove('show');
    } else {
        // 显示下拉框并加载数据
        dropdown.classList.add('show');
        // 如果已有输入内容，显示过滤结果；否则显示全部
        const keyword = input.value.trim();
        if (loadedRunIdData) {
            renderRunIdDropdown(loadedRunIdData, keyword);
        } else {
            loadRunIdOptions();
        }
    }
}

/**
 * 选择 Run ID 选项
 */
function selectRunId(value) {
    const input = document.getElementById('runId');
    input.value = value;
    document.getElementById('runIdDropdown').classList.remove('show');
}

// 存储已加载的 Run ID 数据，避免重复请求
let loadedRunIdData = null;

/**
 * 加载 run_id 选项列表（自定义下拉框）
 * 从 /models 接口获取所有模型，提取 run_id，按注册时间倒序排列
 */
async function loadRunIdOptions() {
    const dropdown = document.getElementById('runIdDropdown');

    // 如果已经加载过，直接显示（根据当前输入过滤）
    if (loadedRunIdData) {
        const keyword = document.getElementById('runId').value.trim();
        renderRunIdDropdown(loadedRunIdData, keyword);
        return;
    }

    // 显示加载状态
    dropdown.innerHTML = '<div class="dropdown-loading"><div class="spinner"></div></div>';

    try {
        serverUrl = document.getElementById('serverUrl').value.replace(/\/+$/, '');
        if (!serverUrl) {
            dropdown.innerHTML = '<div class="dropdown-empty">请先选择服务器地址</div>';
            return;
        }

        // 使用管理 API 获取模型列表（包含详细信息）
        const data = await apiGet('/models');
        const models = data.models || [];

        // 提取 run_id 并收集最新更新时间
        const runIdMap = new Map(); // run_id -> { count, latest_updated_at }
        models.forEach(m => {
            const runId = m.run_id;
            if (runId) {
                if (!runIdMap.has(runId)) {
                    runIdMap.set(runId, { count: 0, latest_updated_at: null });
                }
                const info = runIdMap.get(runId);
                info.count++;
                // 取最新的 updated_at
                if (m.updated_at) {
                    const updateTime = new Date(m.updated_at);
                    if (!info.latest_updated_at || updateTime > info.latest_updated_at) {
                        info.latest_updated_at = updateTime;
                    }
                }
            }
        });

        // 转换为数组并按 updated_at 倒序排列（最新在前）
        const runIds = Array.from(runIdMap.keys()).sort((a, b) => {
            const infoA = runIdMap.get(a);
            const infoB = runIdMap.get(b);
            const timeA = infoA.latest_updated_at ? infoA.latest_updated_at.getTime() : 0;
            const timeB = infoB.latest_updated_at ? infoB.latest_updated_at.getTime() : 0;
            return timeB - timeA; // 倒序：最新在前
        });

        // 存储数据
        loadedRunIdData = { runIds, runIdMap };

        // 渲染下拉框（根据当前输入过滤）
        const keyword = document.getElementById('runId').value.trim();
        renderRunIdDropdown(loadedRunIdData, keyword);

    } catch (e) {
        console.error('加载 Run ID 列表失败:', e);
        dropdown.innerHTML = '<div class="dropdown-empty">加载失败，请手动输入</div>';
    }
}

/**
 * 渲染 Run ID 下拉框内容
 */
function renderRunIdDropdown(data, filterKeyword = '') {
    const dropdown = document.getElementById('runIdDropdown');
    const { runIds, runIdMap } = data;

    // 过滤选项
    let filteredIds = runIds;
    if (filterKeyword) {
        const keyword = filterKeyword.toLowerCase();
        filteredIds = runIds.filter(id => id.toLowerCase().includes(keyword));
    }

    if (filteredIds.length === 0) {
        dropdown.innerHTML = '<div class="dropdown-empty">无匹配结果</div>';
        return;
    }

    dropdown.innerHTML = filteredIds.map(id => {
        const info = runIdMap.get(id);
        const timeStr = info.latest_updated_at ? info.latest_updated_at.toLocaleString() : '无时间';
        return `<div class="dropdown-item" onclick="selectRunId('${escapeHtml(id)}')">
            <div class="dropdown-item-value">${escapeHtml(id)}</div>
            <div class="dropdown-item-meta">${info.count} 模型, ${timeStr}</div>
        </div>`;
    }).join('');
}

/**
 * 根据用户输入过滤 Run ID 下拉框选项
 */
function filterRunIdDropdown() {
    const input = document.getElementById('runId');
    const dropdown = document.getElementById('runIdDropdown');

    // 显示下拉框
    dropdown.classList.add('show');

    // 如果数据未加载，先加载
    if (!loadedRunIdData) {
        loadRunIdOptions();
        return;
    }

    // 根据输入过滤
    const keyword = input.value.trim();
    renderRunIdDropdown(loadedRunIdData, keyword);
}

// ==================== Logic: Sessions ====================
async function fetchSessions() {
    const runId = document.getElementById('runId').value.trim();
    if (!runId) { showToast('请输入 MY_JOB_NAME(Run ID)', 'error'); return; }

    const listEl = document.getElementById('sessionList');
    listEl.innerHTML = '<div class="spinner"></div>';

    try {
        const data = await apiGet(`/trajectories?run_id=${encodeURIComponent(runId)}`);
        const sessions = data.trajectories || [];

        const badge = document.getElementById('sessionCount');
        badge.textContent = sessions.length;
        badge.style.display = sessions.length ? 'inline-block' : 'none';

        if (sessions.length === 0) {
            listEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">&#128196;</div>
                    <div class="empty-text">未找到 Session 数据</div>
                </div>`;
            return;
        }

        sessions.sort((a, b) => (b.last_request_time || '').localeCompare(a.last_request_time || ''));

        listEl.innerHTML = sessions.map((s, i) => `
            <div class="session-item" data-idx="${i}" data-session-id="${escapeHtml(s.session_id)}" onclick="selectSession(${i})">
                <div class="session-id">${escapeHtml(s.session_id)}</div>
                <div class="session-meta">
                    <span>${s.record_count} 记录</span>
                    <span>${formatTime(s.last_request_time)}</span>
                </div>
            </div>
        `).join('');

        window._sessions = sessions;
        document.getElementById('sessionSearch').value = ''; // 清空搜索框
        showToast(`加载成功: ${sessions.length} 个 Sessions`, 'success');
    } catch (e) {
        listEl.innerHTML = `<div style="padding:20px;color:var(--danger);text-align:center">请求失败: ${escapeHtml(e.message)}</div>`;
        showToast('查询失败', 'error');
    }
}

/**
 * 过滤 Sessions 列表
 */
function filterSessions() {
    const keyword = document.getElementById('sessionSearch').value.trim().toLowerCase();
    const items = document.querySelectorAll('.session-item');

    let visibleCount = 0;
    items.forEach(item => {
        const sessionId = item.getAttribute('data-session-id').toLowerCase();
        if (!keyword || sessionId.includes(keyword)) {
            item.style.display = '';
            visibleCount++;
        } else {
            item.style.display = 'none';
        }
    });

    // 更新 badge 显示匹配数量
    const badge = document.getElementById('sessionCount');
    if (keyword && visibleCount !== window._sessions.length) {
        badge.textContent = `${visibleCount}/${window._sessions.length}`;
    } else if (window._sessions) {
        badge.textContent = window._sessions.length;
    }
}

// ==================== Logic: Records ====================
async function selectSession(idx) {
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.session-item[data-idx="${idx}"]`).classList.add('active');

    const session = window._sessions[idx];
    const recordList = document.getElementById('recordList');
    recordList.innerHTML = '<div class="spinner"></div>';
    document.getElementById('recordNav').style.display = 'none';
    closeTrajectory();

    try {
        const data = await apiGet(`/trajectories/${encodeURIComponent(session.session_id)}`);
        let records = data.records || [];
        records.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));

        currentRecords = records;
        currentRecordIdx = 0;
        windowAllExpanded = true;

        if (records.length === 0) {
            recordList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">&#127911;</div>
                    <div class="empty-text">该 Session 没有轨迹记录</div>
                </div>`;
            return;
        }

        renderRecords();
        document.getElementById('recordNav').style.display = 'flex';
        updateNav();
    } catch (e) {
        recordList.innerHTML = `<div style="padding:20px;color:var(--danger);text-align:center">加载失败: ${escapeHtml(e.message)}</div>`;
    }
}

function renderRecords() {
    const list = document.getElementById('recordList');
    list.innerHTML = currentRecords.map((r, i) => {
        const hasError = !!r.error;
        const errorClass = hasError ? 'error' : '';
        const errorBadge = hasError ? '<span class="badge badge-danger">Error</span>' : '';
        const trajActive = trajRecordIdx === i ? ' active' : '';

        return `
        <div class="record-card ${errorClass} open" data-ridx="${i}" id="card-${i}">
            <div class="record-header" onclick="toggleRecord(${i})">
                <div class="rh-left">
                    <span class="rh-idx">#${i + 1}</span>
                    <span class="rh-model">${escapeHtml(r.model || 'Unknown')}</span>
                    ${errorBadge}
                </div>
                <div class="rh-right">
                    <span class="rh-time">${formatTime(r.start_time)}</span>
                    <div class="rh-stats">
                        <span title="Prompt Tokens">P:${r.prompt_tokens ?? '-'}</span>
                        <span title="Completion Tokens">C:${r.completion_tokens ?? '-'}</span>
                        <span title="Duration">${r.processing_duration_ms ? r.processing_duration_ms + 'ms' : '-'}</span>
                    </div>
                    <button class="btn-traj${trajActive}" onclick="event.stopPropagation(); openTrajectory(${i})" title="轨迹视图">轨迹</button>
                    <span class="rh-arrow">&#9654;</span>
                </div>
            </div>
            <div class="record-body" id="body-${i}">
                <div class="json-tree">
                    ${renderJsonTree(r, '', 0)}
                </div>
            </div>
        </div>`;
    }).join('');
}

// ==================== JSON Tree ====================
function renderJsonTree(obj, path, depth) {
    if (obj === null || obj === undefined) return '<span class="tree-null">null</span>';
    if (typeof obj === 'boolean') return `<span class="tree-boolean">${obj}</span>`;
    if (typeof obj === 'number') return `<span class="tree-number">${obj}</span>`;

    if (typeof obj === 'string') {
        if (obj.length > MAX_STRING_LEN) {
            // 存储原文和截断文的 encodeURIComponent 编码，解决展开/收起问题
            const encodedFull = encodeURIComponent(obj);
            const encodedShort = encodeURIComponent(truncate(obj, MAX_STRING_LEN));
            return `<span class="tree-string tree-string-expandable" data-full="${encodedFull}" data-short="${encodedShort}" data-expanded="false" onclick="toggleString(this)">"${escapeHtml(truncate(obj, MAX_STRING_LEN))}"</span>`;
        }
        return `<span class="tree-string">"${escapeHtml(obj)}"</span>`;
    }

    if (Array.isArray(obj)) {
        if (obj.length === 0) return '<span class="tree-bracket">[]</span>';

        const isLarge = obj.length > MAX_ARRAY_RENDER;
        const displayItems = isLarge ? obj.slice(0, MAX_ARRAY_RENDER) : obj;

        let childrenHtml = '';
        displayItems.forEach((item, idx) => {
            const isPrimitive = item === null || typeof item !== 'object';
            childrenHtml += `<div class="tree-row">
                ${isPrimitive
                    ? '<span class="tree-toggle-spacer"></span>'
                    : `<span class="tree-toggle" onclick="toggleNode(this)">▶</span>`}
                ${renderJsonTree(item, `${path}[${idx}]`, depth + 1)}
            </div>`;
        });

        if (isLarge) {
            childrenHtml += `<div style="margin-left:18px;color:var(--text-dim);font-style:italic;font-size:11px;padding:4px 0;">... 显示前 ${MAX_ARRAY_RENDER} 条，共 ${obj.length} 条</div>`;
        }

        const scrollClass = obj.length > 50 ? ' tree-array-scroll' : '';

        // 数组内部内容始终可见，由父级 .tree-children 统一控制显隐
        return `
            <div>
                <span class="tree-bracket">[</span><span class="tree-array-count">${obj.length}</span>
                <div class="${scrollClass}">
                    ${childrenHtml}
                </div>
                <span class="tree-bracket">]</span>
            </div>
        `;
    }

    // Object
    const keys = Object.keys(obj);
    if (keys.length === 0) return '<span class="tree-bracket">{}</span>';

    const isOpen = depth < 1;

    let entriesHtml = '';
    keys.forEach(k => {
        const val = obj[k];
        const preview = getPreview(val);

        // object 属性始终保留 toggle 按钮，因为 .tree-children / .tree-ellipsis 都存在，
        // 收起后需要 toggle 来重新展开
        entriesHtml += `
            <div class="tree-row">
                <span class="tree-toggle" onclick="toggleNode(this)">${isOpen ? '▼' : '▶'}</span>
                <span class="tree-key">"${escapeHtml(k)}"</span>:
                <span class="tree-children" style="display:${isOpen?'inline':'none'}">
                    ${renderJsonTree(val, `${path}.${k}`, depth + 1)}
                </span>
                <span class="tree-ellipsis" style="display:${isOpen?'none':'inline'}">${escapeHtml(preview)}</span>,
            </div>`;
    });

    return `<div><span class="tree-bracket">{</span><div style="margin-left:8px">${entriesHtml}</div><span class="tree-bracket">}</span></div>`;
}

function getPreview(val) {
    if (val === null || val === undefined) return 'null';
    if (typeof val === 'string') return truncate(val, 30);
    if (typeof val === 'number') return val;
    if (typeof val === 'boolean') return val;
    if (Array.isArray(val)) return `Array(${val.length})`;
    return `Object{${Object.keys(val).length}}`;
}

function toggleNode(el) {
    const row = el.parentElement;
    const children = row.querySelector('.tree-children');
    const ellipsis = row.querySelector('.tree-ellipsis');
    if (!children) return; // 安全检查

    const isHidden = children.style.display === 'none';
    children.style.display = isHidden ? 'inline' : 'none';
    if (ellipsis) ellipsis.style.display = isHidden ? 'none' : 'inline';
    el.textContent = isHidden ? '▼' : '▶';
}

function toggleString(el) {
    const isExpanded = el.getAttribute('data-expanded') === 'true';
    if (isExpanded) {
        // 收起
        const shortDecoded = decodeURIComponent(el.getAttribute('data-short'));
        el.innerHTML = '"' + escapeHtml(shortDecoded) + '"';
        el.setAttribute('data-expanded', 'false');
        el.title = '点击展开全文';
    } else {
        // 展开
        const fullDecoded = decodeURIComponent(el.getAttribute('data-full'));
        el.innerHTML = '"' + escapeHtml(fullDecoded) + '"';
        el.setAttribute('data-expanded', 'true');
        el.title = '点击收起';
    }
}

// ==================== Trajectory View (轨迹视图) ====================

/**
 * 从 record 中提取对话消息列表
 * 按顺序返回 OpenAI 格式的 messages 数组
 */
function extractConversation(record) {
    const messages = [];

    // 1. 提取请求消息
    const reqMsgs = record.messages ||
                    (record.raw_request && record.raw_request.messages) ||
                    [];
    if (Array.isArray(reqMsgs)) {
        reqMsgs.forEach(m => messages.push({...m}));
    }

    // 2. 提取响应消息
    let responseMsg = null;
    if (record.raw_response && record.raw_response.choices) {
        const choice = record.raw_response.choices[0];
        if (choice && choice.message) {
            responseMsg = {...choice.message};
        }
    }
    // 回退: 使用 response_text
    if (!responseMsg && record.response_text) {
        responseMsg = {role: 'assistant', content: record.response_text};
    }
    // 回退: 使用 text_response
    if (!responseMsg && record.text_response) {
        const textResp = typeof record.text_response === 'string'
            ? record.text_response
            : JSON.stringify(record.text_response, null, 2);
        responseMsg = {role: 'assistant', content: textResp};
    }

    if (responseMsg) {
        // 避免重复：如果最后一条请求消息和响应消息相同（某些代理会把完整对话放入messages）
        const lastMsg = messages[messages.length - 1];
        if (lastMsg &&
            lastMsg.role === 'assistant' &&
            lastMsg.content === responseMsg.content &&
            !lastMsg.tool_calls && !responseMsg.tool_calls) {
            messages[messages.length - 1] = responseMsg;
        } else {
            messages.push(responseMsg);
        }
    }

    // 3. 如果有错误且没有消息，用错误信息构造一条
    if (messages.length === 0 && record.error) {
        messages.push({role: 'system', content: `[Error] ${record.error}`});
    }

    return messages;
}

/**
 * 打开轨迹视图，显示指定 record 的对话
 */
function openTrajectory(idx) {
    trajRecordIdx = idx;
    const record = currentRecords[idx];
    const panel = document.getElementById('trajPanel');
    panel.classList.add('open');

    // 更新轨迹按钮高亮
    document.querySelectorAll('.btn-traj').forEach(b => b.classList.remove('active'));
    const activeBtn = document.querySelector(`#card-${idx} .btn-traj`);
    if (activeBtn) activeBtn.classList.add('active');

    // 更新面板头部
    document.getElementById('trajRecordLabel').textContent = `#${idx + 1}`;
    document.getElementById('trajModelLabel').textContent = record.model || 'Unknown';

    // 提取并渲染对话
    const messages = extractConversation(record);
    renderChatView(messages, record);
}

/**
 * 关闭轨迹视图
 */
function closeTrajectory() {
    trajRecordIdx = -1;
    const panel = document.getElementById('trajPanel');
    panel.classList.remove('open');
    document.querySelectorAll('.btn-traj').forEach(b => b.classList.remove('active'));
    document.getElementById('chatContainer').innerHTML = `
        <div class="traj-empty">
            <div class="traj-empty-icon">&#128172;</div>
            <div class="empty-text">点击记录卡片上的「轨迹」按钮查看对话</div>
        </div>`;
}

/**
 * 渲染聊天视图
 */
function renderChatView(messages, record) {
    const container = document.getElementById('chatContainer');

    if (messages.length === 0) {
        container.innerHTML = `
            <div class="traj-empty">
                <div class="traj-empty-icon">&#128172;</div>
                <div class="empty-text">该记录没有消息数据</div>
            </div>`;
        return;
    }

    let html = '';

    // 顶部元信息
    html += `<div class="chat-separator"><span>${formatTime(record.start_time)} | ${record.prompt_tokens ?? '?'} prompt / ${record.completion_tokens ?? '?'} completion tokens | ${record.processing_duration_ms ? record.processing_duration_ms + 'ms' : '?'}</span></div>`;

    messages.forEach((msg, i) => {
        const role = msg.role || 'unknown';
        const roleIcons = {system: '&#9881;', user: '&#128100;', assistant: '&#129302;', tool: '&#128295;', thinking: '&#128173;'};
        const roleNames = {system: 'System', user: 'User', assistant: 'Assistant', tool: 'Tool', thinking: 'Thinking'};
        const icon = roleIcons[role] || '&#9679;';
        const name = roleNames[role] || role;

        html += `<div class="chat-msg ${escapeHtml(role)}">`;
        html += `<div class="chat-role"><span class="chat-role-icon">${icon}</span> ${escapeHtml(name)}`;

        // Tool 消息显示 tool_call_id
        if (role === 'tool' && msg.tool_call_id) {
            html += ` <span style="color:var(--text-dim);font-weight:400;font-size:10px;">(${escapeHtml(msg.tool_call_id)})</span>`;
        }
        html += `</div>`;

        // Assistant 消息特殊处理：区分思考、工具、正常输出
        if (role === 'assistant') {
            // 1. 渲染 reasoning_content (思考内容) - 默认完全折叠
            const reasoningContent = msg.reasoning_content || msg.reasoning;
            if (reasoningContent) {
                const reasoningStr = formatMessageContent(reasoningContent);
                if (reasoningStr) {
                    html += `<div class="thinking-block">`;
                    html += `<div class="thinking-header">&#128173; 思考过程 <span style="font-weight:400;color:var(--text-dim)">(${reasoningStr.length} 字符)</span></div>`;
                    html += `<div class="thinking-content hidden" id="thinking-${i}">${escapeHtml(reasoningStr)}</div>`;
                    html += `<button class="thinking-toggle" onclick="toggleThinking(${i})">展开</button>`;
                    html += `</div>`;
                }
            }

            // 2. 渲染 tool_calls (工具调用)
            if (msg.tool_calls && Array.isArray(msg.tool_calls) && msg.tool_calls.length > 0) {
                msg.tool_calls.forEach((tc, tcIdx) => {
                    const fn = tc.function || {};
                    const fnName = fn.name || 'unknown';
                    const fnArgs = fn.arguments || '{}';
                    let argsStr;
                    try {
                        argsStr = typeof fnArgs === 'string' ? JSON.stringify(JSON.parse(fnArgs), null, 2) : JSON.stringify(fnArgs, null, 2);
                    } catch { argsStr = String(fnArgs); }

                    html += `<div class="tool-call-block">`;
                    html += `<div class="tool-call-header">`;
                    html += `<span class="tool-call-name">&#128295; ${escapeHtml(fnName)}</span>`;
                    if (tc.id) html += `<span class="tool-call-id">${escapeHtml(tc.id)}</span>`;
                    html += `</div>`;
                    html += `<div class="tool-call-args">${escapeHtml(argsStr)}</div>`;
                    html += `</div>`;
                });
            }

            // 3. 渲染正常输出内容 (content)
            const contentStr = formatMessageContent(msg.content);
            if (contentStr) {
                html += `<div class="output-block">`;
                html += `<div class="output-header">&#128172; 输出内容</div>`;
                if (contentStr.length > CHAT_COLLAPSE_LEN) {
                    const shortContent = contentStr.substring(0, CHAT_COLLAPSE_LEN);
                    html += `<div class="output-content chat-content-collapsed" id="chat-content-${i}">${escapeHtml(shortContent)}</div>`;
                    html += `<button class="chat-expand-btn" onclick="expandChatMsg(${i}, true)">展开全文 (${contentStr.length} 字符)</button>`;
                    html += `<div class="output-content hidden" id="chat-content-full-${i}">${escapeHtml(contentStr)}</div>`;
                    html += `<div class="output-content hidden" id="chat-content-short-${i}">${escapeHtml(shortContent)}</div>`;
                } else {
                    html += `<div class="output-content">${escapeHtml(contentStr)}</div>`;
                }
                html += `</div>`;
            }
        } else {
            // 非 assistant 消息：常规渲染
            const contentStr = formatMessageContent(msg.content);
            if (contentStr) {
                if (contentStr.length > CHAT_COLLAPSE_LEN) {
                    const shortContent = contentStr.substring(0, CHAT_COLLAPSE_LEN);
                    html += `<div class="chat-content chat-content-collapsed" id="chat-content-${i}">${escapeHtml(shortContent)}</div>`;
                    html += `<button class="chat-expand-btn" onclick="expandChatMsg(${i}, true)">展开全文 (${contentStr.length} 字符)</button>`;
                    html += `<div class="chat-content hidden" id="chat-content-full-${i}">${escapeHtml(contentStr)}</div>`;
                    html += `<div class="chat-content hidden" id="chat-content-short-${i}">${escapeHtml(shortContent)}</div>`;
                } else {
                    html += `<div class="chat-content">${escapeHtml(contentStr)}</div>`;
                }
            }

            // tool 角色的 tool_calls
            if (msg.tool_calls && Array.isArray(msg.tool_calls)) {
                msg.tool_calls.forEach((tc, tcIdx) => {
                    const fn = tc.function || {};
                    const fnName = fn.name || 'unknown';
                    const fnArgs = fn.arguments || '{}';
                    let argsStr;
                    try {
                        argsStr = typeof fnArgs === 'string' ? JSON.stringify(JSON.parse(fnArgs), null, 2) : JSON.stringify(fnArgs, null, 2);
                    } catch { argsStr = String(fnArgs); }

                    html += `<div class="tool-call-block">`;
                    html += `<div class="tool-call-header">`;
                    html += `<span class="tool-call-name">&#128295; ${escapeHtml(fnName)}</span>`;
                    if (tc.id) html += `<span class="tool-call-id">${escapeHtml(tc.id)}</span>`;
                    html += `</div>`;
                    html += `<div class="tool-call-args">${escapeHtml(argsStr)}</div>`;
                    html += `</div>`;
                });
            }
        }

        html += `</div>`;
    });

    container.innerHTML = html;
}

/**
 * 格式化消息内容
 * 支持纯字符串和 multimodal 数组格式
 */
function formatMessageContent(content) {
    if (content === null || content === undefined) return '';
    if (typeof content === 'string') return content;
    if (Array.isArray(content)) {
        // multimodal content: [{type: "text", text: "..."}, {type: "image_url", ...}]
        return content.map(part => {
            if (typeof part === 'string') return part;
            if (part.type === 'text') return part.text || '';
            if (part.type === 'image_url') return `[Image: ${part.image_url?.url || 'url'}]`;
            return JSON.stringify(part, null, 2);
        }).join('\n');
    }
    return JSON.stringify(content, null, 2);
}

/**
 * 展开/收起聊天消息
 */
function expandChatMsg(idx, expand) {
    const el = document.getElementById(`chat-content-${idx}`);
    const btn = el.nextElementSibling;
    const fullEl = document.getElementById(`chat-content-full-${idx}`);
    const shortEl = document.getElementById(`chat-content-short-${idx}`);

    if (expand) {
        el.classList.remove('chat-content-collapsed');
        el.classList.add('hidden');
        fullEl.classList.remove('hidden');
        btn.textContent = '收起';
        btn.onclick = () => expandChatMsg(idx, false);
    } else {
        fullEl.classList.add('hidden');
        el.classList.remove('hidden');
        el.classList.add('chat-content-collapsed');
        el.innerHTML = shortEl.innerHTML;
        btn.textContent = `展开全文`;
        btn.onclick = () => expandChatMsg(idx, true);
    }
}

/**
 * 展开/收起思考内容
 */
function toggleThinking(idx) {
    const contentEl = document.getElementById(`thinking-${idx}`);
    const btn = contentEl.nextElementSibling;
    const isHidden = contentEl.classList.contains('hidden');

    if (isHidden) {
        contentEl.classList.remove('hidden');
        btn.textContent = '收起';
    } else {
        contentEl.classList.add('hidden');
        btn.textContent = '展开';
    }
}

// ==================== 轨迹分析功能 ====================

/**
 * 打开轨迹分析模态弹窗
 */
function analyzeTrajectory() {
    if (currentRecords.length === 0) {
        showToast('没有可分析的记录', 'error');
        return;
    }

    const modal = document.getElementById('analysisModal');
    modal.classList.add('show');

    // 构建关系图并渲染
    const graph = buildRelationGraph(currentRecords);
    renderDAG(graph);

    // 更新统计信息
    updateAnalysisStats(graph);
}

/**
 * 关闭分析模态弹窗
 */
function closeAnalysisModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('analysisModal').classList.remove('show');
}

/**
 * 构建记录关系图
 * 返回: { nodes: [], edges: [], roots: [] }
 */
function buildRelationGraph(records) {
    const nodes = records.map((r, i) => ({
        idx: i,
        hasError: !!r.error,
        children: [],
        parents: []
    }));

    const edges = [];

    // 计算每个 record 的 messages 指纹（请求部分）
    const fingerprints = records.map(r => computeMessagesFingerprint(r.messages || []));

    // 检测继承关系：record[j] 继承自 record[i]
    for (let i = 0; i < records.length; i++) {
        for (let j = 0; j < records.length; j++) {
            if (i === j) continue;

            // 检测 j 是否继承自 i
            if (isChildOf(records[j], records[i], fingerprints[i], fingerprints[j])) {
                nodes[i].children.push(j);
                nodes[j].parents.push(i);
                edges.push({ from: i, to: j });
            }
        }
    }

    // 找出根节点（没有父节点的节点）
    const roots = nodes.filter(n => n.parents.length === 0).map(n => n.idx);

    return { nodes, edges, roots };
}

/**
 * 计算 messages 的指纹（请求部分）
 */
function computeMessagesFingerprint(messages) {
    if (!Array.isArray(messages) || messages.length === 0) return '';
    // 对每条消息取 role + content 前50字符
    return messages.map(m => {
        const content = typeof m.content === 'string' ? m.content : '';
        const truncated = content.length > 50 ? content.substring(0, 50) : content;
        return `${m.role}:${truncated}`;
    }).join('|');
}

/**
 * 判断 child 是否继承自 parent
 * 继承条件：child.messages 的前 N 条与 parent.messages 一致
 */
function isChildOf(child, parent, parentFingerprint, childFingerprint) {
    const parentMsgs = parent.messages || [];
    const childMsgs = child.messages || [];

    if (parentMsgs.length === 0 || childMsgs.length === 0) return false;
    if (childMsgs.length <= parentMsgs.length) return false;

    // 检查前 parentMsgs.length 条消息是否一致
    for (let i = 0; i < parentMsgs.length; i++) {
        if (!messagesEqual(childMsgs[i], parentMsgs[i])) {
            return false;
        }
    }

    return true;
}

/**
 * 比较两条消息是否相等
 */
function messagesEqual(a, b) {
    if (a.role !== b.role) return false;

    const contentA = typeof a.content === 'string' ? a.content : '';
    const contentB = typeof b.content === 'string' ? b.content : '';

    if (contentA !== contentB) return false;

    // 比较 tool_calls（如果存在）
    const tcA = a.tool_calls || [];
    const tcB = b.tool_calls || [];
    if (tcA.length !== tcB.length) return false;

    return true;
}

/**
 * 渲染 DAG 图
 */
function renderDAG(graph) {
    const container = document.getElementById('dagContainer');
    const svg = document.getElementById('dagSvg');

    // 清空现有内容
    container.querySelectorAll('.dag-node').forEach(el => el.remove());
    svg.querySelectorAll('path').forEach(el => el.remove());

    if (graph.nodes.length === 0) {
        container.innerHTML = `<div class="analysis-empty">
            <div class="analysis-empty-icon">&#128202;</div>
            <div>没有数据可分析</div>
        </div>`;
        return;
    }

    // 计算布局：使用简单的层级布局
    const layout = computeLayout(graph);

    // 渲染节点
    const nodeWidth = 70;
    const nodeHeight = 44;
    const horizontalGap = 30;
    const verticalGap = 50;

    layout.positions.forEach((pos, idx) => {
        const node = graph.nodes[idx];
        const x = pos.level * (nodeWidth + horizontalGap) + 40;
        const y = pos.offset * (nodeHeight + verticalGap) + 40;

        const nodeEl = document.createElement('div');
        nodeEl.className = `dag-node ${node.hasError ? 'error' : 'normal'}`;
        nodeEl.style.left = `${x}px`;
        nodeEl.style.top = `${y}px`;
        nodeEl.innerHTML = `<div class="dag-node-label">
            <span class="dag-node-idx">#${idx + 1}</span>
            <span class="dag-node-status">${node.hasError ? 'Error' : 'OK'}</span>
        </div>`;
        nodeEl.onclick = () => jumpToRecord(idx);
        nodeEl.id = `dag-node-${idx}`;
        container.appendChild(nodeEl);

        // 存储位置信息用于绘制连线
        node._x = x + nodeWidth / 2;
        node._y = y + nodeHeight;
    });

    // 渲染连线
    graph.edges.forEach(edge => {
        const fromNode = graph.nodes[edge.from];
        const toNode = graph.nodes[edge.to];

        if (fromNode._x === undefined) return;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const fromX = fromNode._x;
        const fromY = fromNode._y;
        const toX = toNode._x;
        const toY = toNode._y - nodeHeight;  // 连接到节点顶部

        // 使用贝塞尔曲线
        const midY = (fromY + toY) / 2;
        path.setAttribute('d', `M${fromX},${fromY} C${fromX},${midY} ${toX},${midY} ${toX},${toY}`);
        path.setAttribute('stroke', '#64748b');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('fill', 'none');
        path.setAttribute('marker-end', 'url(#arrowhead)');

        svg.appendChild(path);
    });

    // 更新容器大小
    const maxX = Math.max(...layout.positions.map(p => p.level)) * (nodeWidth + horizontalGap) + 150;
    const maxY = Math.max(...layout.positions.map(p => p.offset)) * (nodeHeight + verticalGap) + 150;
    container.style.width = `${Math.max(maxX, 400)}px`;
    container.style.height = `${Math.max(maxY, 300)}px`;
}

/**
 * 计算布局位置
 * 返回: { positions: [{ level, offset }] }
 */
function computeLayout(graph) {
    const positions = graph.nodes.map(() => ({ level: 0, offset: 0 }));

    // BFS 分配层级
    const visited = new Set();
    const queue = [...graph.roots];

    while (queue.length > 0) {
        const idx = queue.shift();
        if (visited.has(idx)) continue;
        visited.add(idx);

        const node = graph.nodes[idx];
        const currentLevel = positions[idx].level;

        node.children.forEach(childIdx => {
            if (!visited.has(childIdx)) {
                positions[childIdx].level = Math.max(positions[childIdx].level, currentLevel + 1);
                queue.push(childIdx);
            }
        });
    }

    // 按层级分组，计算每层内的偏移
    const levels = {};
    graph.nodes.forEach((node, idx) => {
        const level = positions[idx].level;
        if (!levels[level]) levels[level] = [];
        levels[level].push(idx);
    });

    Object.values(levels).forEach((nodesInLevel, levelIdx) => {
        nodesInLevel.forEach((idx, offset) => {
            positions[idx].offset = offset;
        });
    });

    return { positions };
}

/**
 * 更新统计信息
 */
function updateAnalysisStats(graph) {
    const statsEl = document.getElementById('analysisStats');
    const errorCount = graph.nodes.filter(n => n.hasError).length;
    const rootCount = graph.roots.length;
    const edgeCount = graph.edges.length;

    statsEl.innerHTML = `
        <div class="stat-item"><span>总记录:</span><span class="stat-value">${graph.nodes.length}</span></div>
        <div class="stat-item"><span>对话树:</span><span class="stat-value">${rootCount}</span></div>
        <div class="stat-item"><span>关联数:</span><span class="stat-value">${edgeCount}</span></div>
        <div class="stat-item"><span>异常:</span><span class="stat-value" style="color: ${errorCount > 0 ? '#f87171' : 'var(--success)'}">${errorCount}</span></div>
    `;
}

/**
 * 跳转到指定记录
 */
function jumpToRecord(idx) {
    closeAnalysisModal();
    currentRecordIdx = idx;
    updateNav();
    scrollToRecord(idx);

    // 高亮 DAG 节点
    document.querySelectorAll('.dag-node').forEach(n => n.classList.remove('selected'));
    const nodeEl = document.getElementById(`dag-node-${idx}`);
    if (nodeEl) nodeEl.classList.add('selected');
}

// Keyboard Shortcuts
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;

    if (e.key === 'Escape') {
        closeAnalysisModal();
        closeTrajectory();
    }

    if (currentRecords.length === 0) return;

    if (e.key === 'ArrowUp' || e.key === 'k') { e.preventDefault(); navigateRecord(-1); }
    if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); navigateRecord(1); }
});
</script>
