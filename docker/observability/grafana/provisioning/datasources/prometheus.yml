# ============================================================
# Grafana 数据源自动配置
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # bridge 网络下用服务名通信；端口与 .env PROMETHEUS_PORT 一致
    url: http://prometheus:19090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST