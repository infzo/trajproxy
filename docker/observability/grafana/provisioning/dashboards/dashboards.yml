# ============================================================
# Grafana Dashboard 自动加载配置
# ============================================================

apiVersion: 1

providers:
  - name: "trajproxy"
    orgId: 1
    folder: "TrajProxy"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false