# ============================================================
# Prometheus 主配置
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# 告警规则
rule_files:
  - "alert_rules.yml"

# AlertManager 地址（bridge 网络下用服务名通信）
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# 抓取配置 — 使用 file_sd_configs 动态加载节点
scrape_configs:
  - job_name: "trajproxy"
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: "/metrics"
    file_sd_configs:
      - files:
          - "targets.json"
        refresh_interval: 30s

  # Prometheus 自身监控（与 .env 中 PROMETHEUS_PORT 保持一致，默认 19090）
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:19090"]