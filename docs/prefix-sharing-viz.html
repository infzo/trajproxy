<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prefix Sharing 前向/反向传播可视化</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2035;
  --bg-card-hover: #1f2847;
  --border: #2a3555;
  --border-glow: #3b82f6;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --provider: #22d3ee;
  --provider-dim: rgba(34, 211, 238, 0.15);
  --provider-glow: rgba(34, 211, 238, 0.4);
  --reuser: #f59e0b;
  --reuser-dim: rgba(245, 158, 11, 0.15);
  --reuser-glow: rgba(245, 158, 11, 0.4);
  --forward-flow: #34d399;
  --forward-flow-dim: rgba(52, 211, 153, 0.2);
  --backward-flow: #f472b6;
  --backward-flow-dim: rgba(244, 114, 182, 0.2);
  --shared: #a78bfa;
  --shared-dim: rgba(167, 139, 250, 0.15);
  --danger: #ef4444;
  --prefix-color: #818cf8;
  --suffix-a-color: #22d3ee;
  --suffix-b-color: #f59e0b;
  --cell-size: 32px;
  --matrix-gap: 2px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  min-height: 100vh;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Scanline effect */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.03) 2px,
    rgba(0, 0, 0, 0.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 30px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}

.header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--provider), var(--reuser));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.header .subtitle {
  font-size: 14px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

/* Mode tabs */
.mode-tabs {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin: 20px 0;
  background: var(--bg-secondary);
  border-radius: 12px;
  padding: 4px;
  width: fit-content;
  margin-left: auto;
  margin-right: auto;
}

.mode-tab {
  padding: 10px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  color: var(--text-muted);
  border: 1px solid transparent;
  font-family: 'JetBrains Mono', monospace;
}

.mode-tab:hover { color: var(--text-primary); background: var(--bg-card); }

.mode-tab.active {
  background: var(--bg-card);
  color: var(--text-primary);
  border-color: var(--border);
  box-shadow: 0 0 20px rgba(34, 211, 238, 0.1);
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 20px 0;
  padding: 16px 24px;
  background: var(--bg-secondary);
  border-radius: 16px;
  border: 1px solid var(--border);
}

.ctrl-btn {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s ease;
}

.ctrl-btn:hover {
  background: var(--bg-card-hover);
  border-color: var(--provider);
  box-shadow: 0 0 15px rgba(34, 211, 238, 0.15);
}

.ctrl-btn.playing {
  background: rgba(34, 211, 238, 0.15);
  border-color: var(--provider);
}

.step-indicator {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-secondary);
  min-width: 120px;
  text-align: center;
}

.step-title-display {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  min-width: 200px;
  text-align: center;
}

.speed-control {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

.speed-control input[type="range"] {
  width: 80px;
  accent-color: var(--provider);
}

/* Progress bar */
.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--bg-secondary);
  border-radius: 2px;
  margin: 16px 0;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--provider), var(--reuser));
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Step navigation dots */
.step-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin: 12px 0;
  flex-wrap: wrap;
}

.step-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.3s ease;
}

.step-dot:hover { border-color: var(--provider); }

.step-dot.active {
  background: var(--provider);
  border-color: var(--provider);
  box-shadow: 0 0 8px var(--provider-glow);
}

.step-dot.backward.active {
  background: var(--backward-flow);
  border-color: var(--backward-flow);
  box-shadow: 0 0 8px var(--backward-flow-dim);
}

/* Main viz area */
.viz-area {
  background: var(--bg-secondary);
  border-radius: 20px;
  border: 1px solid var(--border);
  padding: 32px;
  min-height: 600px;
  position: relative;
  overflow: hidden;
}

.viz-area::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--provider), transparent);
  opacity: 0.5;
}

/* Step content */
.step-content {
  display: none;
  animation: fadeIn 0.5s ease;
}

.step-content.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Section headers */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.section-header .badge {
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge-forward {
  background: var(--forward-flow-dim);
  color: var(--forward-flow);
  border: 1px solid rgba(52, 211, 153, 0.3);
}

.badge-backward {
  background: var(--backward-flow-dim);
  color: var(--backward-flow);
  border: 1px solid rgba(244, 114, 182, 0.3);
}

.badge-core {
  background: var(--shared-dim);
  color: var(--shared);
  border: 1px solid rgba(167, 139, 250, 0.3);
}

.section-header h2 {
  font-size: 20px;
  font-weight: 700;
}

.section-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  line-height: 1.7;
  max-width: 800px;
}

.section-desc code {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(34, 211, 238, 0.1);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  color: var(--provider);
}

.highlight-provider { color: var(--provider); font-weight: 600; }
.highlight-reuser { color: var(--reuser); font-weight: 600; }
.highlight-shared { color: var(--shared); font-weight: 600; }
.highlight-backward { color: var(--backward-flow); font-weight: 600; }
.highlight-forward { color: var(--forward-flow); font-weight: 600; }

/* Side by side layout */
.comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 24px;
}

.comparison-card {
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.comparison-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.comparison-card.provider-card::before {
  background: linear-gradient(90deg, var(--provider), transparent);
}

.comparison-card.reuser-card::before {
  background: linear-gradient(90deg, var(--reuser), transparent);
}

.comparison-card.shared-card::before {
  background: linear-gradient(90deg, var(--shared), transparent);
}

.card-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-label .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.provider-card .card-label .dot { background: var(--provider); box-shadow: 0 0 8px var(--provider-glow); }
.reuser-card .card-label .dot { background: var(--reuser); box-shadow: 0 0 8px var(--reuser-glow); }
.shared-card .card-label .dot { background: var(--shared); box-shadow: 0 0 8px var(--shared-dim); }

.provider-card .card-label { color: var(--provider); }
.reuser-card .card-label { color: var(--reuser); }
.shared-card .card-label { color: var(--shared); }

/* Token visualization */
.token-row {
  display: flex;
  gap: 4px;
  margin: 12px 0;
  flex-wrap: wrap;
}

.token {
  width: 48px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.4s ease;
  position: relative;
}

.token-prefix {
  background: var(--prefix-color);
  color: var(--bg-primary);
  opacity: 0.9;
}

.token-suffix-a {
  background: var(--suffix-a-color);
  color: var(--bg-primary);
  opacity: 0.9;
}

.token-suffix-b {
  background: var(--suffix-b-color);
  color: var(--bg-primary);
  opacity: 0.9;
}

.token.strikethrough {
  opacity: 0.2;
  text-decoration: line-through;
  transform: scale(0.85);
}

.token.saved {
  box-shadow: 0 0 12px rgba(52, 211, 153, 0.4);
  border: 2px solid var(--forward-flow);
}

.token.highlight-new {
  animation: pulseGlow 1.5s ease infinite;
}

@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 5px rgba(34, 211, 238, 0.3); }
  50% { box-shadow: 0 0 20px rgba(34, 211, 238, 0.6); }
}

/* Matrix visualization */
.matrix-container {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  margin: 8px;
}

.matrix-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.matrix-shape {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  opacity: 0.7;
  margin-top: 2px;
}

.matrix {
  display: inline-grid;
  gap: var(--matrix-gap);
  padding: 4px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  border: 1px solid var(--border);
  position: relative;
}

.matrix-cell {
  width: var(--cell-size);
  height: var(--cell-size);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  border-radius: 4px;
  transition: all 0.3s ease;
  cursor: default;
}

.cell-provider {
  background: var(--provider-dim);
  color: var(--provider);
  border: 1px solid rgba(34, 211, 238, 0.2);
}

.cell-reuser {
  background: var(--reuser-dim);
  color: var(--reuser);
  border: 1px solid rgba(245, 158, 11, 0.2);
}

.cell-prefix {
  background: rgba(129, 140, 248, 0.15);
  color: var(--prefix-color);
  border: 1px solid rgba(129, 140, 248, 0.25);
}

.cell-shared {
  background: var(--shared-dim);
  color: var(--shared);
  border: 1px solid rgba(167, 139, 250, 0.25);
}

.cell-neutral {
  background: rgba(148, 163, 184, 0.08);
  color: var(--text-secondary);
  border: 1px solid rgba(148, 163, 184, 0.1);
}

.cell-forward-grad {
  background: var(--forward-flow-dim);
  color: var(--forward-flow);
  border: 1px solid rgba(52, 211, 153, 0.25);
}

.cell-backward-grad {
  background: var(--backward-flow-dim);
  color: var(--backward-flow);
  border: 1px solid rgba(244, 114, 182, 0.25);
}

.cell-zero {
  background: rgba(148, 163, 184, 0.03);
  color: var(--text-muted);
  border: 1px solid rgba(148, 163, 184, 0.05);
  opacity: 0.5;
}

.cell-mask {
  background: rgba(239, 68, 68, 0.1);
  color: var(--danger);
  border: 1px solid rgba(239, 68, 68, 0.2);
}

.cell-mask-off {
  background: rgba(148, 163, 184, 0.03);
  color: rgba(100, 116, 139, 0.3);
  border: 1px solid rgba(148, 163, 184, 0.05);
}

.cell-mask-on {
  background: var(--forward-flow-dim);
  color: var(--forward-flow);
  border: 1px solid rgba(52, 211, 153, 0.3);
}

/* Flow arrows */
.flow-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin: 16px 0;
  flex-wrap: wrap;
}

.flow-arrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  color: var(--text-muted);
  transition: color 0.3s ease;
}

.flow-arrow.forward { color: var(--forward-flow); }
.flow-arrow.backward { color: var(--backward-flow); }

.op-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 6px 12px;
  background: var(--bg-card);
  border-radius: 8px;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.op-label.core-op {
  border-color: var(--shared);
  color: var(--shared);
  background: var(--shared-dim);
}

/* KV Store visualization */
.kv-store {
  background: var(--bg-card);
  border: 2px solid var(--shared);
  border-radius: 12px;
  padding: 16px;
  margin: 16px 0;
  position: relative;
}

.kv-store::before {
  content: 'PrefixKVStore';
  position: absolute;
  top: -10px;
  left: 16px;
  background: var(--bg-card);
  padding: 0 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--shared);
}

.kv-slot {
  display: flex;
  gap: 8px;
  margin: 8px 0;
  align-items: center;
  padding: 8px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
}

.kv-slot-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  min-width: 60px;
}

.kv-tensor {
  display: flex;
  gap: 2px;
}

.kv-cell {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
}

/* Gradient flow visualization */
.gradient-flow {
  position: relative;
  padding: 20px;
  margin: 16px 0;
}

.gradient-path {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 12px 0;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px dashed;
}

.gradient-path.own-path {
  border-color: rgba(34, 211, 238, 0.3);
  background: var(--provider-dim);
}

.gradient-path.reuser-path {
  border-color: rgba(245, 158, 11, 0.3);
  background: var(--reuser-dim);
}

.gradient-path.shared-path {
  border-color: rgba(167, 139, 250, 0.3);
  background: var(--shared-dim);
}

.gradient-path .path-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
}

.gradient-path .path-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-left: auto;
}

/* Info box */
.info-box {
  background: rgba(34, 211, 238, 0.05);
  border: 1px solid rgba(34, 211, 238, 0.15);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 20px 0;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text-secondary);
}

.info-box.warning {
  background: rgba(244, 114, 182, 0.05);
  border-color: rgba(244, 114, 182, 0.15);
}

.info-box.success {
  background: rgba(52, 211, 153, 0.05);
  border-color: rgba(52, 211, 153, 0.15);
}

.info-box.core-insight {
  background: rgba(167, 139, 250, 0.05);
  border-color: rgba(167, 139, 250, 0.15);
}

.info-box strong {
  color: var(--text-primary);
}

/* Equation display */
.equation {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  padding: 16px 20px;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  border-left: 3px solid var(--shared);
  margin: 16px 0;
  line-height: 2;
  overflow-x: auto;
}

/* Animated gradient line */
.gradient-line {
  height: 2px;
  border-radius: 1px;
  margin: 8px 0;
  position: relative;
  overflow: hidden;
}

.gradient-line.forward-line {
  background: var(--forward-flow-dim);
}

.gradient-line.backward-line {
  background: var(--backward-flow-dim);
}

.gradient-line::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  border-radius: 1px;
  animation: flowPulse 2s ease-in-out infinite;
}

.forward-line::after {
  background: linear-gradient(90deg, transparent, var(--forward-flow), transparent);
}

.backward-line::after {
  background: linear-gradient(90deg, transparent, var(--backward-flow), transparent);
}

@keyframes flowPulse {
  0% { left: -50%; }
  100% { left: 100%; }
}

/* Summary cards */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin: 20px 0;
}

.summary-card {
  background: var(--bg-card);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 20px;
}

.summary-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  font-family: 'JetBrains Mono', monospace;
}

.summary-card ul {
  list-style: none;
  padding: 0;
}

.summary-card li {
  font-size: 13px;
  color: var(--text-secondary);
  padding: 6px 0;
  border-bottom: 1px solid rgba(148, 163, 184, 0.08);
  display: flex;
  align-items: center;
  gap: 8px;
}

.summary-card li::before {
  content: '→';
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
}

/* Attention mask grid */
.mask-grid {
  display: inline-grid;
  gap: 3px;
}

.mask-cell {
  width: 36px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  border-radius: 3px;
}

/* Arrow connectors */
.arrow-down {
  text-align: center;
  font-size: 24px;
  color: var(--text-muted);
  margin: 4px 0;
  font-family: 'JetBrains Mono', monospace;
}

.arrow-down.forward { color: var(--forward-flow); }
.arrow-down.backward { color: var(--backward-flow); }

/* Three column layout */
.triple-comparison {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

/* Full width card */
.full-card {
  background: var(--bg-card);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 20px;
  margin: 16px 0;
}

.full-card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}

/* Animate new elements */
.animate-in {
  animation: slideIn 0.6s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Responsive */
@media (max-width: 1024px) {
  .comparison { grid-template-columns: 1fr; }
  .triple-comparison { grid-template-columns: 1fr; }
  :root { --cell-size: 28px; }
}

/* Tooltip */
.tooltip {
  position: relative;
}

.tooltip:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-primary);
  color: var(--text-primary);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 11px;
  white-space: nowrap;
  border: 1px solid var(--border);
  z-index: 100;
  margin-bottom: 4px;
}

/* Animated connection line */
.connection-line {
  position: absolute;
  border: 1px dashed;
  opacity: 0.4;
}

/* Logprob restore highlight */
.restore-highlight {
  padding: 8px 16px;
  background: linear-gradient(90deg, var(--shared-dim), transparent);
  border-left: 3px solid var(--shared);
  border-radius: 0 8px 8px 0;
  margin: 8px 0;
  font-size: 13px;
}

/* Position labels */
.pos-labels {
  display: flex;
  gap: 4px;
  margin-bottom: 4px;
}

.pos-label {
  width: 48px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-muted);
}

/* Row label for matrices */
.row-labels {
  display: flex;
  flex-direction: column;
  gap: var(--matrix-gap);
  padding: 4px 0;
}

.row-label {
  height: var(--cell-size);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  min-width: 40px;
}

.matrix-with-labels {
  display: flex;
  align-items: flex-start;
  gap: 4px;
}

/* No-detach indicator */
.no-detach-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #ef4444;
  font-weight: 600;
}

/* Scrollable */
.scroll-x {
  overflow-x: auto;
  padding-bottom: 8px;
}

/* Animated pulse for key operations */
@keyframes matrixPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(167, 139, 250, 0); }
  50% { box-shadow: 0 0 20px 2px rgba(167, 139, 250, 0.3); }
}

.pulse-core {
  animation: matrixPulse 2s ease infinite;
}

/* Tab-like phase indicator */
.phase-indicator {
  display: flex;
  gap: 2px;
  margin-bottom: 20px;
}

.phase-segment {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--bg-card);
  transition: background 0.3s ease;
}

.phase-segment.done { background: var(--forward-flow); opacity: 0.5; }
.phase-segment.current { background: var(--forward-flow); }
.phase-segment.backward-done { background: var(--backward-flow); opacity: 0.5; }
.phase-segment.backward-current { background: var(--backward-flow); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Prefix Sharing Forward / Backward Propagation</h1>
    <div class="subtitle">前缀共享 · 前向传播 · 反向传播 · 梯度流动 · 交互式可视化</div>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="compare" onclick="switchMode('compare')">对比模式</div>
    <div class="mode-tab" data-mode="baseline" onclick="switchMode('baseline')">仅基线</div>
    <div class="mode-tab" data-mode="prefix" onclick="switchMode('prefix')">仅 Prefix Sharing</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="prevStep()" title="上一步">◀</button>
    <button class="ctrl-btn" id="playBtn" onclick="togglePlay()" title="播放/暂停">▶</button>
    <button class="ctrl-btn" onclick="nextStep()" title="下一步">▶</button>
    <div class="step-indicator" id="stepIndicator">1 / 13</div>
    <div class="step-title-display" id="stepTitle">样本定义</div>
    <div class="speed-control">
      <span>速度</span>
      <input type="range" min="1" max="5" value="3" id="speedSlider" onchange="updateSpeed()">
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <div class="step-dots" id="stepDots"></div>

  <div class="viz-area" id="vizArea">
    <!-- Steps will be rendered here by JS -->
  </div>
</div>

<script>
// ===== Step definitions =====
const STEPS = [
  { id: 'sample-def', title: '0. 样本定义', phase: 'setup' },
  { id: 'input-trim', title: '1. 输入裁剪', phase: 'forward' },
  { id: 'embedding', title: '2. Embedding 查表', phase: 'forward' },
  { id: 'qkv-proj', title: '3. QKV 投影', phase: 'forward' },
  { id: 'rope', title: '4. RoPE 位置编码', phase: 'forward' },
  { id: 'kv-store', title: '5. KV Store & 注入', phase: 'forward', core: true },
  { id: 'attention', title: '6. Attention 计算', phase: 'forward' },
  { id: 'mlp', title: '7. Context & MLP', phase: 'forward' },
  { id: 'logprob', title: '8. Logprob 组装', phase: 'forward', core: true },
  { id: 'loss', title: '9. Loss & 梯度', phase: 'backward' },
  { id: 'logprob-back', title: '10. Logprob 反向', phase: 'backward', core: true },
  { id: 'kv-grad', title: '11. KV 梯度回传', phase: 'backward', core: true },
  { id: 'param-update', title: '12. 参数更新', phase: 'backward' },
  { id: 'summary', title: '13. 全局总结', phase: 'summary' },
];

let currentStep = 0;
let isPlaying = false;
let playTimer = null;
let speed = 3;

// ===== Init =====
function init() {
  renderDots();
  renderStep(0);
}

function renderDots() {
  const container = document.getElementById('stepDots');
  container.innerHTML = '';
  STEPS.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (s.phase === 'backward' ? ' backward' : '');
    if (i === currentStep) dot.classList.add('active');
    dot.onclick = () => goToStep(i);
    dot.title = s.title;
    container.appendChild(dot);
  });
}

function renderStep(idx) {
  currentStep = idx;
  const step = STEPS[idx];

  // Update controls
  document.getElementById('stepIndicator').textContent = `${idx + 1} / ${STEPS.length}`;
  document.getElementById('stepTitle').textContent = step.title;
  document.getElementById('progressFill').style.width = `${(idx / (STEPS.length - 1)) * 100}%`;

  // Update dots
  document.querySelectorAll('.step-dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });

  // Render content
  const vizArea = document.getElementById('vizArea');
  vizArea.innerHTML = getStepContent(idx);
}

function nextStep() {
  if (currentStep < STEPS.length - 1) renderStep(currentStep + 1);
  else if (isPlaying) togglePlay();
}

function prevStep() {
  if (currentStep > 0) renderStep(currentStep - 1);
}

function goToStep(idx) {
  renderStep(idx);
}

function togglePlay() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('playBtn');
  btn.textContent = isPlaying ? '⏸' : '▶';
  btn.classList.toggle('playing', isPlaying);

  if (isPlaying) {
    scheduleNext();
  } else {
    clearTimeout(playTimer);
  }
}

function scheduleNext() {
  if (!isPlaying) return;
  const delays = [4000, 3000, 2000, 1200, 800];
  playTimer = setTimeout(() => {
    nextStep();
    if (isPlaying) scheduleNext();
  }, delays[speed - 1]);
}

function updateSpeed() {
  speed = parseInt(document.getElementById('speedSlider').value);
}

function switchMode(mode) {
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  renderStep(currentStep);
}

// ===== Matrix helper =====
function matrix(label, rows, cols, cellFn, shape, cls = '') {
  let html = `<div class="matrix-container ${cls}">`;
  if (label) html += `<div class="matrix-label">${label}</div>`;
  html += `<div class="matrix" style="grid-template-columns: repeat(${cols}, var(--cell-size))">`;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = cellFn(r, c);
      html += `<div class="matrix-cell ${cell.cls}" title="${cell.tip || ''}">${cell.val}</div>`;
    }
  }
  html += '</div>';
  if (shape) html += `<div class="matrix-shape">${shape}</div>`;
  html += '</div>';
  return html;
}

function tokenEl(text, cls, extra = '') {
  return `<div class="token ${cls} ${extra}">${text}</div>`;
}

// ===== Step Content Generators =====
function getStepContent(idx) {
  const generators = [
    stepSampleDef, stepInputTrim, stepEmbedding, stepQKVProj,
    stepRoPE, stepKVStore, stepAttention, stepMLP, stepLogprob,
    stepLoss, stepLogprobBack, stepKVGrad, stepParamUpdate, stepSummary
  ];
  return generators[idx]();
}

// ----- Step 0: Sample Definition -----
function stepSampleDef() {
  return `
    <div class="section-header">
      <span class="badge badge-forward">设置</span>
      <h2>样本定义 & 场景说明</h2>
    </div>
    <div class="section-desc">
      RL 训练中，同一 prompt 会产生多个 response。以下使用 2 个样本作为示例：<br>
      <span class="highlight-provider">Provider A</span> 和 <span class="highlight-reuser">Reuser B</span> 共享前缀 <code>[P0, P1, P2]</code>（3 个 token），后缀各不相同。
    </div>

    <div class="comparison">
      <div class="comparison-card provider-card">
        <div class="card-label"><span class="dot"></span> Provider A（完整计算）</div>
        <div style="margin-bottom:8px;color:var(--text-secondary);font-size:13px">原始序列 (5 tokens)</div>
        <div class="token-row">
          ${tokenEl('P0', 'token-prefix')}
          ${tokenEl('P1', 'token-prefix')}
          ${tokenEl('P2', 'token-prefix')}
          ${tokenEl('Sa0', 'token-suffix-a')}
          ${tokenEl('Sa1', 'token-suffix-a')}
        </div>
        <div class="info-box" style="margin-top:12px">
          Provider <strong>保留完整序列</strong>，正常参与所有层的计算。<br>
          计算完成后，将 K、V 存入 <code>PrefixKVStore</code> 供 Reuser 复用。
        </div>
      </div>

      <div class="comparison-card reuser-card">
        <div class="card-label"><span class="dot"></span> Reuser B（复用前缀）</div>
        <div style="margin-bottom:8px;color:var(--text-secondary);font-size:13px">原始序列 (6 tokens)</div>
        <div class="token-row">
          ${tokenEl('P0', 'token-prefix')}
          ${tokenEl('P1', 'token-prefix')}
          ${tokenEl('P2', 'token-prefix')}
          ${tokenEl('Sb0', 'token-suffix-b')}
          ${tokenEl('Sb1', 'token-suffix-b')}
          ${tokenEl('Sb2', 'token-suffix-b')}
        </div>
        <div class="info-box warning" style="margin-top:12px">
          Reuser <strong>只保留后缀</strong> <code>[Sb0, Sb1, Sb2]</code>（3 tokens）。<br>
          前缀 K、V 从 Provider 的 PrefixKVStore 中加载，通过 <code>torch.cat</code> 拼接。<br>
          <strong>节省 3 个 token 的计算量</strong>（从 6 → 3，节省 50%）。
        </div>
      </div>
    </div>

    <div class="full-card">
      <h3>前缀共享检测流程</h3>
      <div class="flow-row" style="justify-content:flex-start;gap:12px">
        <div class="op-label">原始 batch</div>
        <span class="flow-arrow forward">→</span>
        <div class="op-label core-op">TriePrefixDetector</div>
        <span class="flow-arrow forward">→</span>
        <div class="op-label core-op">PrefixSharingPlanner</div>
        <span class="flow-arrow forward">→</span>
        <div class="op-label">执行元数据</div>
      </div>
      <div style="margin-top:12px;font-size:13px;color:var(--text-secondary);line-height:1.8">
        <strong>1. 检测</strong>：使用 Trie 树发现 batch 中共享前缀 → <code>prefix_lens=[3,3]</code><br>
        <strong>2. 规划</strong>：A 为 Provider，B 为 Reuser → <code>provider_index=[0,0]</code><br>
        <strong>3. 裁剪</strong>：B 的输入裁剪为 <code>[Sb0, Sb1, Sb2]</code>，位置偏移 <code>q_position_offset=3</code>
      </div>
    </div>
  `;
}

// ----- Step 1: Input Trimming -----
function stepInputTrim() {
  return `
    <div class="section-header">
      <span class="badge badge-forward">前向 Step 1</span>
      <h2>输入裁剪 (Input Trimming)</h2>
    </div>
    <div class="section-desc">
      基于 Planner 的元数据，Reuser 的输入只保留后缀部分。这是所有后续节省的源头。
    </div>

    <div class="comparison">
      <div class="comparison-card provider-card">
        <div class="card-label"><span class="dot"></span> Provider A</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">keep_range = (0, 5) → 保留全部</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">input_ids:</div>
        <div class="token-row">
          ${tokenEl('P0', 'token-prefix')}
          ${tokenEl('P1', 'token-prefix')}
          ${tokenEl('P2', 'token-prefix')}
          ${tokenEl('Sa0', 'token-suffix-a')}
          ${tokenEl('Sa1', 'token-suffix-a')}
        </div>
        <div class="token-row" style="margin-top:4px">
          ${tokenEl('0', 'token-prefix')}
          ${tokenEl('1', 'token-prefix')}
          ${tokenEl('2', 'token-prefix')}
          ${tokenEl('3', 'token-suffix-a')}
          ${tokenEl('4', 'token-suffix-a')}
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">↑ position_ids</div>
      </div>

      <div class="comparison-card reuser-card">
        <div class="card-label"><span class="dot"></span> Reuser B</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">keep_range = (3, 6) → 只保留后缀</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:4px">原始 input_ids:</div>
        <div class="token-row">
          ${tokenEl('P0', 'token-prefix', 'strikethrough')}
          ${tokenEl('P1', 'token-prefix', 'strikethrough')}
          ${tokenEl('P2', 'token-prefix', 'strikethrough')}
          ${tokenEl('Sb0', 'token-suffix-b')}
          ${tokenEl('Sb1', 'token-suffix-b')}
          ${tokenEl('Sb2', 'token-suffix-b')}
        </div>
        <div style="font-size:13px;color:var(--reuser);margin:8px 0">↓ 裁剪后</div>
        <div class="token-row">
          ${tokenEl('Sb0', 'token-suffix-b', 'saved')}
          ${tokenEl('Sb1', 'token-suffix-b', 'saved')}
          ${tokenEl('Sb2', 'token-suffix-b', 'saved')}
        </div>
        <div class="token-row" style="margin-top:4px">
          ${tokenEl('3', 'token-suffix-b')}
          ${tokenEl('4', 'token-suffix-b')}
          ${tokenEl('5', 'token-suffix-b')}
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">↑ position_ids（从 3 开始，非 0！）</div>
      </div>
    </div>

    <div class="info-box success">
      <strong>节省分析</strong>：原始总 token 数 = 5 + 6 = 11。裁剪后 = 5 + 3 = 8。<br>
      节省 <strong>3 个 token</strong>（27%），后续每一层都受益于这个裁剪。
    </div>
  `;
}

// ----- Step 2: Embedding -----
function stepEmbedding() {
  return `
    <div class="section-header">
      <span class="badge badge-forward">前向 Step 2</span>
      <h2>Embedding 查表</h2>
    </div>
    <div class="section-desc">
      Token ID → Embedding 向量。查表操作本身无差异，但 Reuser 的输入更短。
    </div>

    <div class="comparison">
      <div class="comparison-card provider-card">
        <div class="card-label"><span class="dot"></span> Provider A</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">5 个 token → 5 行 embedding</div>
        ${matrix('hidden_A', 5, 4, (r,c) => {
          const cls = r < 3 ? 'cell-prefix' : 'cell-provider';
          const v = (Math.random()*2-1).toFixed(2);
          return {val: v, cls, tip: `位置 ${r}, 维度 ${c}`};
        }, '[5, dim]')}
      </div>

      <div class="comparison-card reuser-card">
        <div class="card-label"><span class="dot"></span> Reuser B</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">3 个 token → 3 行 embedding（少了 3 行！）</div>
        ${matrix('hidden_B', 3, 4, (r,c) => {
          const v = (Math.random()*2-1).toFixed(2);
          return {val: v, cls: 'cell-reuser', tip: `位置 ${r+3}, 维度 ${c}`};
        }, '[3, dim]')}
      </div>
    </div>

    <div class="info-box">
      Embedding 查表是 O(1) per token，但后续所有矩阵运算的计算量都正比于序列长度。<br>
      <strong>少 3 个 token = 每一层都少计算 3 行</strong>，累积效应显著。
    </div>
  `;
}

// ----- Step 3: QKV Projection -----
function stepQKVProj() {
  return `
    <div class="section-header">
      <span class="badge badge-forward">前向 Step 3</span>
      <h2>QKV 投影 (Linear Layer)</h2>
    </div>
    <div class="section-desc">
      将 hidden_states 通过 3 组权重矩阵投影为 Q、K、V。这是第一个大量节省计算的地方。
    </div>

    <div class="full-card">
      <h3>Provider A: hidden_A [5, dim] @ W_qkv [dim, 3×dim] → [Q_A, K_A, V_A]</h3>
      <div class="scroll-x">
        <div class="flow-row">
          ${matrix('hidden_A', 5, 4, (r,c) => ({
            val: (Math.random()*2-1).toFixed(1),
            cls: r < 3 ? 'cell-prefix' : 'cell-provider'
          }), '[5, dim]')}
          <span class="flow-arrow forward">×</span>
          ${matrix('W_qkv', 4, 4, (r,c) => ({
            val: ['wqq','wqk','wqv','...'][c] === '...' ? '⋯' : ['wqq','wqk','wqv','...'][c],
            cls: 'cell-neutral'
          }), '[dim, 3dim]')}
          <span class="flow-arrow forward">=</span>
          ${matrix('[Q,K,V]_A', 5, 4, (r,c) => ({
            val: (Math.random()*2-1).toFixed(1),
            cls: r < 3 ? 'cell-prefix' : 'cell-provider',
            tip: c===0?'Q':c===1?'K':c===2?'V':'...'
          }), '[5, 3×dim]')}
        </div>
      </div>
    </div>

    <div class="full-card">
      <h3>Reuser B: hidden_B [3, dim] @ W_qkv [dim, 3×dim] → [Q_B, K_B, V_B]</h3>
      <div class="scroll-x">
        <div class="flow-row">
          ${matrix('hidden_B', 3, 4, (r,c) => ({
            val: (Math.random()*2-1).toFixed(1),
            cls: 'cell-reuser'
          }), '[3, dim]')}
          <span class="flow-arrow forward">×</span>
          ${matrix('W_qkv', 4, 4, (r,c) => ({
            val: ['wqq','wqk','wqv','...'][c] === '...' ? '⋯' : ['wqq','wqk','wqv','...'][c],
            cls: 'cell-neutral'
          }), '[dim, 3dim]')}
          <span class="flow-arrow forward">=</span>
          ${matrix('[Q,K,V]_B', 3, 4, (r,c) => ({
            val: (Math.random()*2-1).toFixed(1),
            cls: 'cell-reuser',
            tip: c===0?'Q (suffix only)':c===1?'K (suffix only)':c===2?'V (suffix only)':'...'
          }), '[3, 3×dim]')}
        </div>
      </div>
      <div class="info-box success" style="margin-top:12px">
        Reuser 少计算了 <strong>3 行 × 3dim</strong> 次乘加（前缀部分的 QKV 投影完全跳过）。
      </div>
    </div>
  `;
}

// ----- Step 4: RoPE -----
function stepRoPE() {
  return `
    <div class="section-header">
      <span class="badge badge-forward">前向 Step 4</span>
      <h2>RoPE 旋转位置编码</h2>
    </div>
    <div class="section-desc">
      对 Q 和 K 施加位置相关的旋转。<span class="highlight-reuser">Reuser 的 Q 位置从 3 开始</span>（而非 0），
      保证后续 attention 中 Q 看到的位置信息与基线一致。
    </div>

    <div class="comparison">
      <div class="comparison-card provider-card">
        <div class="card-label"><span class="dot"></span> Provider A</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">q_position_offset = 0</div>
        <div class="scroll-x">
          ${matrix('Q_A after RoPE', 5, 4, (r,c) => ({
            val: `p${r}`,
            cls: r < 3 ? 'cell-prefix' : 'cell-provider',
            tip: `绝对位置 ${r}`
          }), '[5, dim]')}
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:8px">
          位置: [0, 1, 2, 3, 4] — 从 0 开始，正常
        </div>
      </div>

      <div class="comparison-card reuser-card">
        <div class="card-label"><span class="dot"></span> Reuser B</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">q_position_offset = 3</div>
        <div class="scroll-x">
          ${matrix('Q_B after RoPE', 3, 4, (r,c) => ({
            val: `p${r+3}`,
            cls: 'cell-reuser',
            tip: `绝对位置 ${r+3}（offset=3）`
          }), '[3, dim]')}
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:8px">
          位置: [3, 4, 5] — 从 <span style="color:var(--reuser)">prefix_len=3</span> 开始
        </div>
      </div>
    </div>

    <div class="info-box core-insight">

      这通过 <code>q_position_offsets</code> 参数实现（参见 <code>backends/torch_ref.py:48-51</code>）。

}

// ----- Step 5: KV Store & Injection (CORE) -----

            └─ (暂无其他)
          </div>
        </div>
      </div>
    </div>

    <div class="full-card pulse-core">
      <h3>② Reuser B 加载 Provider 的前缀 K、V，拼接自己的后缀</h3>
      <div class="scroll-x">

          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">加载 Provider 前 3 行</div>
            ${matrix('K_A[:3]', 3, 4, (r,c) => ({
              val: `k${r}${c}`,
              cls: 'cell-prefix'
            }), '[3, dim]')}
          </div>
          <span class="flow-arrow forward">+</span>
          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">自己的后缀 K</div>
            ${matrix('K_B', 3, 4, (r,c) => ({
              val: `k${r+3}${c}'`,
              cls: 'cell-reuser'
            }), '[3, dim]')}
          </div>
          <span class="flow-arrow forward">torch.cat →</span>
          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">expanded_K_B</div>
            ${matrix('expanded_K_B', 6, 4, (r,c) => ({
              val: r < 3 ? `k${r}${c}` : `k${r}${c}'`,
              cls: r < 3 ? 'cell-prefix' : 'cell-reuser'
            }), '[6, dim]')}
          </div>
        </div>
      </div>

      <div class="no-detach-badge" style="margin:12px 0">
        ⚡ NO detach() — 梯度可以通过 torch.cat 回传到 Provider
      </div>

      <div class="info-box core-insight">
        <strong>关键：torch.cat 没有 detach()</strong><br><br>
        <code>expanded_K = torch.cat([entry.key_tensor[:3], K_B_suffix], dim=0)</code><br><br>
        <code>entry.key_tensor[:3]</code> 是 Provider 计算出的 K 的前缀部分，<strong>仍然连接在 Provider 的计算图上</strong>。
        反向传播时，Reuser 的梯度会通过 <code>torch.cat</code> 的 backward 自动 split 回两部分：<br>
        • K_A[:3] 的梯度 → 传回 Provider 的参数（如 W_qkv）<br>
        • K_B_suffix 的梯度 → 只影响 Reuser 自身<br><br>

      </div>
    </div>
  `;
}

// ----- Step 6: Attention -----
function stepAttention() {
  const mkMask = (qLen, kvLen, qStart) => {
    let h = '<div class="mask-grid" style="grid-template-columns:repeat('+kvLen+',36px)">';
    for (let q = 0; q < qLen; q++) {
      for (let k = 0; k < kvLen; k++) {
        const ok = k <= qStart + q ? 'on' : 'off';
        h += `<div class="mask-cell cell-mask-${ok}">${ok==='on'?'✓':'✗'}</div>`;
      }
    }
    h += '</div>';
    return h;
  };

  return `
    <div class="section-header">
      <span class="badge badge-forward">前向 Step 6</span>
      <h2>Attention 计算</h2>
    </div>
    <div class="section-desc">
      <code>Attention(Q, K, V) = softmax(Q·K<sup>T</sup> / √d + mask) · V</code>。
      注意 Reuser 使用 expanded K、V，且 causal mask 有位置偏移。
    </div>

    <div class="comparison">
      <div class="comparison-card provider-card">
        <div class="card-label"><span class="dot"></span> Provider A</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
          Score = Q_A[5×dim] · K_A[5×dim]<sup>T</sup> / √d → [5, 5]
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">Causal Mask (q_start=0):</div>
        ${mkMask(5, 5, 0)}
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px">
          标准 causal mask：位置 i 只能看到 0..i
        </div>
      </div>

      <div class="comparison-card reuser-card">
        <div class="card-label"><span class="dot"></span> Reuser B</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
          Score = Q_B[3×dim] · expanded_K_B[6×dim]<sup>T</sup> / √d → [3, 6]
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">Causal Mask (q_start=3):</div>
        ${mkMask(3, 6, 3)}
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px">
          偏移 causal mask：Q 从位置 3 开始<br>
          Q[0](pos=3) 可以看到 KV[0..3]<br>
          Q[1](pos=4) 可以看到 KV[0..4]<br>
          Q[2](pos=5) 可以看到 KV[0..5]
        </div>
      </div>
    </div>

    <div class="info-box">
      <strong>等价性</strong>：Reuser B 的 attention 输出与基线中 B 独立计算时的后缀部分完全相同。<br>
      因为 mask 和 RoPE 偏移确保了每个 Q 位置只能看到它应该看到的 K、V。
    </div>
  `;
}

// ----- Step 8: Logprob Assembly (CORE) -----

// ----- Step 9: Loss & Gradient -----
function stepLoss() {

    </div>
  `;
}

    </div>
  `;
}

// ----- Step 11: KV Gradient Flow -----
function stepKVGrad() {
  return `
    <div class="section-header">
      <span class="badge badge-core">核心差异</span>
      <h2>KV 梯度回传 — torch.cat backward</h2>
    </div>
    <div class="section-desc">
      在 Attention backward 中，梯度从 score 反向流到 K 和 V。
      由于 Reuser 的 expanded K/V 是通过 <code>torch.cat</code> 拼接的，
      <span class="highlight-backward">梯度会自动 split 回 Provider 和 Reuser 各自的部分</span>。
    </div>

    <div class="full-card pulse-core">
      <h3>Forward: torch.cat 拼接</h3>
      <div class="scroll-x">
        <div class="flow-row" style="justify-content:flex-start">
          ${matrix('K_A[:3]', 3, 4, (r,c) => ({
            val: `k${r}${c}`,
            cls: 'cell-prefix'
          }))}
          ${matrix('K_B', 3, 4, (r,c) => ({
            val: `k${r+3}${c}'`,
            cls: 'cell-reuser'
          }))}
          <span class="flow-arrow forward">→ cat →</span>
          ${matrix('expanded_K_B', 6, 4, (r,c) => ({
            val: r < 3 ? `k${r}${c}` : `k${r}${c}'`,
            cls: r < 3 ? 'cell-prefix' : 'cell-reuser'
          }))}
        </div>
      </div>
    </div>

    <div class="full-card pulse-core">
      <h3>Backward: torch.cat 的梯度 split</h3>
      <div class="equation">
        <span style="color:var(--backward-flow)">∂L/∂expanded_K_B</span> = attention_backward(B) → shape [6, dim]<br><br>
        torch.cat backward 自动 split：<br>
        <span style="color:var(--provider)">∂L/∂K_A[:3]</span> = <span style="color:var(--backward-flow)">∂L/∂expanded_K_B</span>[:3]　← 传回 Provider<br>
        <span style="color:var(--reuser)">∂L/∂K_B_suffix</span> = <span style="color:var(--backward-flow)">∂L/∂expanded_K_B</span>[3:]　← Reuser 自身
      </div>

      <div class="scroll-x" style="margin-top:16px">
        <div class="flow-row" style="justify-content:flex-start">
          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Reuser attention 产生的 K 梯度</div>
            ${matrix('dL/d(expanded_K_B)', 6, 4, (r,c) => ({
              val: `g${r}${c}`,
              cls: 'cell-backward-grad'
            }), '[6, dim]')}
          </div>
          <span class="flow-arrow backward">split →</span>
          <div>
            <div style="font-size:11px;color:var(--provider);margin-bottom:4px">传回 Provider K_A[:3]</div>
            ${matrix('dL/d(K_A[:3])\nfrom reuser', 3, 4, (r,c) => ({
              val: `g${r}${c}`,
              cls: 'cell-backward-grad'
            }), '[3, dim]')}
          </div>
          <div style="margin-left:8px">
            <div style="font-size:11px;color:var(--reuser);margin-bottom:4px">Reuser 自身 K_B</div>
            ${matrix('dL/d(K_B)', 3, 4, (r,c) => ({
              val: `g${r+3}${c}`,
              cls: 'cell-backward-grad'
            }), '[3, dim]')}
          </div>
        </div>
      </div>
    </div>

    <div class="full-card">
      <h3>Provider K 梯度最终累加</h3>
      <div class="equation">
        <span style="color:var(--provider)">∂L/∂K_A 总梯度</span> = <span style="color:var(--provider)">∂L/∂K_A 自身 attention</span> + <span style="color:var(--reuser)">∑ ∂L/∂K_A[:3] from each Reuser</span><br><br>
        <span style="color:var(--text-muted);font-size:12px">// 如果有 N 个 Reuser 复用同一个 Provider，Provider 的前缀 K 会收到 N+1 条梯度</span>
      </div>
    </div>

    <div class="info-box core-insight">
      <strong>为什么不需要 detach？</strong><br>
      • 如果 <code>entry.key_tensor[:3]</code> 被 detach，它变成常数 → 梯度在 cat 处断裂<br>
      • Provider 的参数（W_qkv）将<strong>无法收到</strong> Reuser 的梯度<br>
      • 这会导致<strong>梯度不等价</strong>：Provider 只收到自身 loss 的梯度，丢失了 Reuser 的贡献<br>
      • 代码中明确设计为 <strong>"Never detach"</strong>（<code>prefix_store.py</code> 设计原则）
    </div>
  `;
}

// ----- Step 12: Parameter Update -----
function stepParamUpdate() {
  return `
    <div class="section-header">
      <span class="badge badge-backward">反向 Step 12</span>
      <h2>参数更新 — 与基线完全相同</h2>
    </div>
    <div class="section-desc">
      Prefix Sharing 只影响梯度的<strong>计算路径和累加方式</strong>，不改变优化器行为。
      参数更新步骤与基线完全相同。
    </div>

    <div class="full-card">
      <h3>优化器步骤（Mixed Precision Training）</h3>
      <div style="padding:20px">
        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="gradient-path own-path" style="flex-direction:row">
            <span class="path-label" style="color:var(--provider)">Step 1</span>
            <span class="flow-arrow forward">→</span>
            <span class="path-desc">FP16 模型参数梯度 → FP32 主参数梯度</span>
          </div>
          <div class="gradient-path own-path" style="flex-direction:row">
            <span class="path-label" style="color:var(--provider)">Step 2</span>
            <span class="flow-arrow forward">→</span>
            <span class="path-desc">梯度缩放 + NaN/Inf 检查（GradScaler）</span>
          </div>
          <div class="gradient-path own-path" style="flex-direction:row">
            <span class="path-label" style="color:var(--provider)">Step 3</span>
            <span class="flow-arrow forward">→</span>
            <span class="path-desc">L2 范数梯度裁剪（clip_grad_norm）</span>
          </div>
          <div class="gradient-path shared-path" style="flex-direction:row">
            <span class="path-label" style="color:var(--shared)">Step 4</span>
            <span class="flow-arrow forward">→</span>
            <span class="path-desc">Adam/AdamW 更新 FP32 主参数</span>
          </div>
          <div class="gradient-path own-path" style="flex-direction:row">
            <span class="path-label" style="color:var(--provider)">Step 5</span>
            <span class="flow-arrow forward">→</span>
            <span class="path-desc">FP32 主参数 → FP16 模型参数</span>
          </div>
        </div>
      </div>
    </div>

    <div class="comparison">
      <div class="comparison-card provider-card">
        <div class="card-label"><span class="dot"></span> Provider (W_qkv) 梯度来源</div>
        <div class="equation" style="border-left-color:var(--provider);font-size:12px">
          dL/dW_qkv = <span style="color:var(--provider)">∂L_A/∂W_qkv</span>  ← 自身 loss<br>
          <span style="margin-left:120px">+ <span style="color:var(--reuser)">∂L_B/∂W_qkv via K_A[:3]</span>  ← KV 梯度回传<br></span>
          <span style="margin-left:120px">+ <span style="color:var(--reuser)">∂L_B/∂W_qkv via logits_A[2]</span>  ← restored logprob</span>
        </div>
      </div>

      <div class="comparison-card reuser-card">
        <div class="card-label"><span class="dot"></span> Reuser (W_qkv) 梯度来源</div>
        <div class="equation" style="border-left-color:var(--reuser);font-size:12px">
          dL/dW_qkv = <span style="color:var(--reuser)">∂L_B_suffix/∂W_qkv</span><br>
          <span style="color:var(--text-muted);font-size:11px">// 只有自身 suffix 部分的梯度</span>
        </div>
      </div>
    </div>

    <div class="info-box success">
      <strong>数学等价性</strong>：Prefix Sharing 下所有参数的梯度总和与基线完全相等。<br>
      区别仅在于梯度的<strong>计算路径</strong>（通过共享 K/V 和 restored logprob 而非独立重复计算），<br>
      优化器看到的梯度值是相同的，因此参数更新也是相同的。
    </div>
  `;
}
