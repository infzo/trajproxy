# traj_proxy 后端服务（All-in-One：localhost 通信）
upstream traj_proxy_backend {
    server 127.0.0.1:12300;
    keepalive 128;
}

# litellm upstream（All-in-One：localhost 通信）
upstream litellm {
    server 127.0.0.1:4000;
    keepalive 256;
}

server {
    listen 12345;

    # ========== 推理请求：转发到 litellm ==========

    # 1. 带 run_id 和 session_id 的推理请求
    # 格式: /s/{run_id}/{session_id}/v1/chat/completions
    # nginx 从路径提取 run_id 和 session_id，设置为 header
    # 注意：此规则必须在一段路径规则之前，否则会被错误匹配
    location ~ ^/s/([^/]+)/([^/]+)/(v1/.*)$ {
        proxy_pass http://litellm/$3;
        proxy_set_header x-run-id $1;
        proxy_set_header x-session-id $2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 流式响应支持
        proxy_buffering off;
        proxy_cache off;

        # 超时配置：高并发流式场景需要足够长的等待时间
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 2. 只带 session_id 的推理请求
    # 格式: /s/{session_id}/v1/chat/completions
    # nginx 从路径提取 session_id，设置为 header
    location ~ ^/s/([^/]+)/(v1/.*)$ {
        proxy_pass http://litellm/$2;
        proxy_set_header x-session-id $1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 流式响应支持
        proxy_buffering off;
        proxy_cache off;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 3. 不带 run_id 和 session_id 的 OpenAI 推理请求
    location = /v1/chat/completions {
        proxy_pass http://litellm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 4. 不带 run_id 和 session_id 的 Anthropic/Claude 推理请求
    location = /v1/messages {
        proxy_pass http://litellm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ========== 非 推理请求：直接转发到 traj_proxy ==========

    # 5. 模型管理 API（包含 /models 和 /models/*）
    location /models {
        proxy_pass http://traj_proxy_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6. 轨迹查询 API
    location = /trajectory {
        proxy_pass http://traj_proxy_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 7. 健康检查
    location = /health {
        proxy_pass http://traj_proxy_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 8. 其他请求默认走 litellm（保持兼容）
    location / {
        proxy_pass http://litellm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
