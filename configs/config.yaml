# ProxyWorker 配置
proxy_workers:
  count: 2                    # Worker 数量
  base_port: 12300            # 起始端口（12300, 12301）
  models:                     # 预置模型配置
    - model_name: qwen3.5-2b
      url: http://host.docker.internal:8000
      api_key: sk-1234
      tokenizer_path: Qwen/Qwen3.5-2B
      token_in_token_out: true  # 启用 Token-in-Token-out 模式，支持前缀匹配缓存
      # parser 配置（可选，不指定则不做解析）
      # tool_parser: "qwen3_coder"
      # reasoning_parser: "qwen3"
    # 添加更多模型配置
    # - model_name: deepseek-v3
    #   url: http://openai-proxy:8080
    #   api_key: sk-abcd
    #   tokenizer_path: deepseek-ai/DeepSeek-V3
    #   token_in_token_out: false
    #   tool_parser: "deepseek_v3"
    #   reasoning_parser: "deepseek_v3"

# Ray 配置
ray:
  num_cpus: 4                 # CPU 核心数
  working_dir: "/app"         # 默认容器内路径，可通过环境变量 RAY_WORKING_DIR 覆盖
  pythonpath: "/app"          # 默认容器内 PYTHONPATH，可通过环境变量 RAY_PYTHONPATH 覆盖

# 数据库配置
database:
  url: "postgresql://llmproxy:dbpassword9090@db:5432/traj_proxy"
  # 连接池配置
  pool:
    min_size: 2               # 最小连接数
    max_size: 20              # 最大连接数
    timeout: 30               # 连接超时时间（秒）

# ProcessorManager 配置
processor_manager:
  sync_interval: 30           # 模型同步间隔（秒）
  sync_max_retries: 3         # 同步失败最大重试次数
  sync_retry_delay: 5         # 同步重试初始延迟（秒），采用指数退避
