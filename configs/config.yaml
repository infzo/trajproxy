# models 目录路径（用于 tokenizer 加载）
# 容器内默认路径为 /app/models，本地开发可改为相对路径
models_dir: /app/models

# 自定义 parser 目录路径（用于加载自定义 tool_parser 和 reasoning_parser）
# 容器内默认路径为 /app/custom_parsers，本地开发可改为相对路径
# 目录结构：
#   custom_parsers/
#     tool_parsers/       # 自定义工具解析器
#       my_parser.py
#     reasoning_parsers/  # 自定义推理解析器
#       my_reasoning.py
custom_parsers_dir: /app/custom_parsers

# ProxyWorker 配置
proxy_workers:
  count: 2                    # Worker 数量
  base_port: 12300            # 起始端口（12300, 12301）
  max_concurrent_requests: 4096  # 单 Worker 最大并发请求数（超限返回 429）
  semaphore_acquire_timeout: 5.0  # 信号量获取超时（秒），超时返回 429
  max_restarts: -1            # Actor 异常重启次数：-1 = 无限重启，0 = 不重启，N = 最多 N 次
  max_task_retries: 2         # Actor 方法调用失败后重试次数
  gzip_enabled: false         # 是否启用 HTTP gzip 响应压缩（默认关；开启可大幅降低轨迹查询传输量）
  gzip_minimum_size: 1024     # 触发压缩的最小响应体大小（字节）
  models:                     # 预置模型配置
    - model_name: Qwen/Qwen3-0.6B
      url: http://host.docker.internal:8000/v1
      api_key: sk-1234
    - model_name: Qwen/Qwen3-0.6B
      run_id: app-001
      url: http://host.docker.internal:8000/v1
      api_key: sk-1234
      tokenizer_path: Qwen/Qwen3-0.6B
      token_in_token_out: true
      tool_parser: "hermes"
    - model_name: qwen3.5-2b
      url: http://host.docker.internal:8000/v1
      api_key: sk-1234
    - model_name: qwen3.5-2b
      run_id: app-001
      url: http://host.docker.internal:8000/v1
      api_key: sk-1234
      tokenizer_path: Qwen/Qwen3.5-2B
      token_in_token_out: true  # 启用 Token-in-Token-out 模式，支持前缀匹配缓存
      tool_parser: "qwen3_coder"
      reasoning_parser: "qwen3"

# Ray 配置
ray:
  num_cpus: 4                 # CPU 核心数
  working_dir: "/app/traj_proxy"  # Ray working_dir 限定在代码目录，避免打包 models/ 等大文件超过 512MiB 限制
  pythonpath: "/app"          # 默认容器内 PYTHONPATH，可通过环境变量 RAY_PYTHONPATH 覆盖

# 数据库配置
database:
  url: "postgresql://llmproxy:dbpassword9090@db:5432/traj_proxy"
  # 连接池配置
  pool:
    min_size: 2               # 最小连接数
    max_size: 4               # 最大连接数
    timeout: 60               # 连接超时时间（秒）
  # 轨迹存储模式：full（全量，存储所有详情字段）| compact（精简，跳过冗余字段，节省 30-50% 存储）
  storage_mode: full

# ProcessorManager 配置
processor_manager:
  sync_fallback_interval: 300   # 兜底全量同步间隔（秒），默认 5 分钟
  sync_max_retries: 3           # 同步失败最大重试次数
  sync_retry_delay: 5           # 同步重试初始延迟（秒），采用指数退避
  listen_reconnect_delay: 5     # LISTEN 连接重连初始延迟（秒）
  listen_max_reconnect_delay: 60  # LISTEN 连接重连最大延迟（秒）
  processor_cache_max_size: 32    # LRU 缓存最大 Processor 数（per worker）
  processor_idle_timeout: 300     # 空闲超时（秒），超时未访问的 Processor 自动淘汰，0 = 禁用

# InferClient 配置
infer_client:
  connect_timeout: 10       # 连接超时（秒）
  read_timeout: 600         # 读取超时（秒）
  max_connections: 0        # HTTP 连接池上限（0 = 不限制，每个 InferClient）
  max_retries: 2            # 请求失败重试次数（针对 502/503/504 错误）

# 可观测性配置
observability:
  enabled: true                    # 全局开关（环境变量 OBSERVABILITY_ENABLED 可覆盖）
  log_format: text                 # text | json（环境变量 LOG_FORMAT 可覆盖）
  metrics_enabled: true            # 是否启用 Prometheus metrics
  health_deep_check: false         # 健康检查是否做深度检查

# route_experts 大字段卸载配置
# ⚠️ 生产警示：本期未实现清理任务（r3_blob_refs 表与 Local 磁盘/CSB 对象无回收机制）。
# enabled=true 前必须先确认清理任务就绪，否则 r3_blob_refs 表与存储会持续膨胀。
# 详见 docs/design/features/route-experts-offload.md 十一/十四。
route_experts_offload:
  enabled: true                     # 本地部署已开启（生产开启前需先实现清理任务）
  ttl_hours: 2                      # expires_at = created_at + ttl
  blob_key_prefix: "route_experts"  # 对象 key 前缀
  backend: "local"                  # csb | local
  csb:
    app_token: ""                   # 或 env CSB_APP_TOKEN
    bucket: "trajproxy-r3"
    endpoint: "https://csb.example.com"  # client 直访用
    verify_tls: true                # 生产环境应启用 TLS 校验
  local:
    # 容器内 worker (CWD=/app) 解析为 /app/shard_data，经 compose volume 映射到项目根 shard_data；
    # 根目录本地直接跑 worker (CWD=项目根) 解析为项目根 shard_data。
    # e2e 需从项目根运行，access_path 方能解析到同一物理目录。
    write_path: "./shard_data"      # TrajProxy 写路径
    access_path: "./shard_data"     # client/e2e 读路径，留空默认=write_path
