# traj_proxy 后端服务
upstream traj_proxy_backend {
    server traj_proxy:12300;
}

# litellm upstream
upstream litellm {
    server litellm:4000;
}

server {
    listen 12345;

    # ========== 推理请求：转发到 litellm ==========

    # 1. 带 session_id 的推理请求（OpenAI 和 Anthropic）
    # 格式: /s/{session_id}/v1/chat/completions 或 /s/{session_id}/v1/messages
    location ~ ^/s/([^/]+)/(v1/.*)$ {
        proxy_pass http://litellm/$2;
        proxy_set_header x-session-id $1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 流式响应支持
        proxy_buffering off;
        proxy_cache off;
    }

    # 2. 不带 session_id 的 OpenAI 推理请求
    location = /v1/chat/completions {
        proxy_pass http://litellm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # 3. 不带 session_id 的 Anthropic/Claude 推理请求
    location = /v1/messages {
        proxy_pass http://litellm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # ========== 非 推理请求：直接转发到 traj_proxy ==========

    # 4. 模型管理 API（包含 /models 和 /models/*）
    location /models {
        proxy_pass http://traj_proxy_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. 轨迹查询 API
    location = /trajectory {
        proxy_pass http://traj_proxy_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6. 健康检查
    location = /health {
        proxy_pass http://traj_proxy_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 7. 其他请求默认走 litellm（保持兼容）
    location / {
        proxy_pass http://litellm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
