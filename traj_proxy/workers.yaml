# Worker配置文件

# ProxyCore Worker配置
proxy_core_workers:
  count: 2                    # Worker数量
  base_port: 8000             # 起始端口（8000, 8001）
  model: qwen3.5-2b  # 默认模型名称
  tokenizer_path: Qwen/Qwen2.5-7B-Instruct  # Tokenizer 路径（huggingface）

# TranscriptProvider Worker配置
transcript_provider_workers:
  count: 1                    # Worker数量
  base_port: 9000             # 起始端口（9000）

# Ray配置
ray:
  num_cpus: 4                 # CPU核心数

# 数据库配置
database:
  url: "postgresql://llmproxy:dbpassword9090@db:5432/litellm"

# LLM 服务配置
llm:
  base_url: http://host.docker.internal:1234
  api_key: sk-1234
