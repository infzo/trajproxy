model_list:
  # 通用匹配：所有模型请求都路由到 traj_proxy
  - model_name: "qwen3.5-2b"
    litellm_params:
      model: "openai/qwen3.5-2b"
      api_base: http://traj_proxy:8000/v1  # 内部 proxy_core 服务
      api_key: "sk-1234"                  # traj_proxy 不需要真实 API Key

litellm_settings:
  drop_params: true       # 自动删除模型不支持的参数
  # modify_params: false    # 不修改请求参数（包括 model 字段）
  disable_request_checking: true

general_settings:
  master_key: "sk-1234"  # 可选，保护你的代理